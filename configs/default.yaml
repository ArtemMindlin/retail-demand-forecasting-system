project:
  random_seed: 42

dataset:
  source: fresh_retailnet
  hf_dataset_id: Dingdong-Inc/FreshRetailNet-50K
  splits:
    train: data/train.parquet
    eval: data/eval.parquet
  local_cache_dir: data/raw/fresh_retailnet
  processed_panel_path: data/processed/fresh_retailnet_train.parquet
  use_local_cache: true
  refresh_processed_cache: false
  top_n_series: 50
  min_history_days: 70
  max_rows: null
  horizon: 7
  use_eval_as_holdout: false

preprocessing:
  drop_negative_sales: true
  fill_missing_values: true
  imputation_strategy: supervised

features:
  lags: [1, 7, 14, 28]
  rolling_windows: [7, 28]
  include_static_ids: true
  include_weather_lags: true
  include_discount_lags: true
  include_stockout_lags: true

validation:
  initial_train_days: 45
  n_folds: 3
  fold_size_days: 7
  retrain_each_fold: true
  drift_triggered_retrain: false

drift:
  threshold: 15.0
  delta: 0.005
  min_instances: 2

models:
  quantiles: [0.1, 0.5, 0.9]
  seasonal_period: 7
  n_estimators: 500
  learning_rate: 0.05
  max_depth: 8
  use_tuning: false
  tuning_trials: 20
  optimize_for_cost: true

inventory:
  overstock_cost: 1.0
  stockout_cost: 4.0
  use_series_costs: true
  series_cost_strategy: synthetic_series
  clip_negative_orders: true
  pareto_order_scales: [0.7, 0.8, 0.9, 1.0, 1.1, 1.2, 1.3]
  synthetic_cost_config:
    perishability_weights: [0.5, 0.3, 0.2]
    slow_moving_weights: [0.6, 0.4]
    criticality_weights: [0.7, 0.3]
    perishability_base: 0.8
    perishability_multiplier: 0.8
    slow_moving_base: 0.9
    slow_moving_multiplier: 0.5
    service_criticality_base: 0.9
    service_criticality_multiplier: 0.5

reporting:
  output_dir: reports
  run_name: fresh_retailnet_v2
  make_plots: true
