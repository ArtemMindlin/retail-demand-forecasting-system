# Operational simulation (OPS plane) — walk-forward week-by-week playback.
#
# Balanced profile: rich features (incl. monthly memory) + a longer initial train
# so the conformal coverage stays defensible (~target). An earlier minimum-warmup
# profile (lags [1,7]/rolling [7], 28-day train) was tried to squeeze out more
# weeks, but it collapsed coverage to ~36% — without lag_14/28 + rolling_28 the
# model could not track the upward demand trend and systematically under-forecast.
#   - features: weekly + bi-weekly + monthly cycles -> warmup = 28 days
#   - calibration window = 14 days
#   - horizon = 7 (forecast one week ahead), streamed daily and played back weekly
#   - initial train ~49 days (build_ops_sim_split.py --train-days 49) -> ~5-6 weeks
#
# Reads a dedicated train/eval split built by scripts/build_ops_sim_split.py into
# data/processed/ops_sim/ (so the canonical data/processed splits are untouched).
project:
  random_seed: 42
  run_mode: simulate_ops

dataset:
  hf_dataset_id: Dingdong-Inc/FreshRetailNet-50K
  splits:
    train: data/train.parquet
    eval: data/eval.parquet
  local_cache_dir: data/raw/fresh_retailnet
  processed_panel_dir: data/processed/ops_sim
  use_cache: true
  top_n_series: 100
  min_history_days: 14
  max_rows: 50000
  horizon: 7

preprocessing:
  drop_negative_sales: true
  fill_missing_values: true
  imputation_strategy: supervised

features:
  lags: [1, 7, 14, 28]
  rolling_windows: [7, 28]
  include_static_ids: true
  include_weather_lags: true
  include_discount_lags: true
  include_stockout_lags: true

validation:
  initial_train_days: 45
  n_folds: 2
  fold_size_days: 7
  calibration_days: 14
  retrain_each_fold: false
  drift_triggered_retrain: false

drift:
  threshold: 15.0
  delta: 0.005
  min_instances: 2

data_quality:
  max_missing_fraction_warning: 0.05
  max_data_age_days: null

models:
  models_dir: models
  quantiles: [0.1, 0.5, 0.9]
  seasonal_period: 7
  n_estimators: 200
  learning_rate: 0.05
  max_depth: 6
  use_tuning: false
  tuning_trials: 1

inventory:
  overstock_cost: 1.0
  stockout_cost: 4.0
  use_series_costs: true
  clip_negative_orders: true
  pareto_order_scales: [0.7, 0.8, 0.9, 1.0, 1.1, 1.2, 1.3]
  global_capacity_units: 3000000

  synthetic_cost_config:
    perishability_weights: [0.5, 0.3, 0.2]
    slow_moving_weights: [0.6, 0.4]
    criticality_weights: [0.7, 0.3]
    perishability_base: 0.8
    perishability_multiplier: 0.8
    slow_moving_base: 0.9
    slow_moving_multiplier: 0.5
    service_criticality_base: 0.9
    service_criticality_multiplier: 0.5

business:
  flag_cold_start: true
  flag_drift_watch: true
  flag_high_uncertainty: true
  high_uncertainty_interval_quantile: 0.95
  flag_extreme_order_quantity: true
  extreme_order_quantity_quantile: 0.99
  champion_data_strategy: Observed
  champion_model_name: catboost
  champion_backend_name: conformal_catboost_official
  champion_min_cost_improvement_pct: 0.0
  champion_max_service_level_degradation: 0.02

reporting:
  output_dir: reports
  run_name: ops_sim
  make_plots: false

simulation:
  # null = never retrain (baseline) vs 7 = weekly retrain (production policy)
  retrain_cadences: [null, 7]
  simulation_days: null
  make_plots: true
