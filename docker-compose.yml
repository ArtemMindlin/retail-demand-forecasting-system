version: '3.8'

services:
  # 1. Caddy — reverse proxy + automatic HTTPS
  caddy:
    image: caddy:2-alpine
    container_name: retail_forecasting_caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

  # 2. FastAPI Model Serving
  api:
    build: .
    container_name: retail_forecasting_api
    expose:
      - "8000"
    command: ["uvicorn", "retail_forecasting.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./configs:/app/configs
      - ./data:/app/data
      - ./reports:/app/reports
    environment:
      - RETAIL_PROJECT__RUN_MODE=score_daily
      - AUTH_USERNAME=ArtemMindlin
      - AUTH_PASSWORD=greita2017saulia2013
    restart: unless-stopped

  # 2. MLflow Tracking Server
  mlflow:
    build: .
    container_name: retail_forecasting_mlflow
    ports:
      - "5000:5000"
    command: ["mlflow", "ui", "--host", "0.0.0.0", "--port", "5000"]
    environment:
      - MLFLOW_SERVER_ALLOWED_HOSTS=*
    volumes:
      - ./mlruns:/app/mlruns
      - ./mlflow.db:/app/mlflow.db
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
