    function ExpLatentChart({ latentData }) {
      const wrapRef = useRef(null);
      const [W, setW] = useState(800);
      const H = 300;
      const pad = { top: 18, right: 60, bottom: 34, left: 52 };

      useEffect(() => {
        if (!wrapRef.current) return;
        const ro = new ResizeObserver(es => {
          for (const e of es) setW(Math.max(320, Math.floor(e.contentRect.width)));
        });
        ro.observe(wrapRef.current);
        return () => ro.disconnect();
      }, []);

      const geom = useMemo(() => {
        if (!latentData || !latentData.dates || latentData.dates.length === 0) return null;
        const n = latentData.dates.length;
        const innerW = W - pad.left - pad.right;
        const innerH = H - pad.top - pad.bottom;
        const xs = latentData.dates.map((_, i) => pad.left + (i / Math.max(n - 1, 1)) * innerW);

        const demandVals = [...(latentData.observed || []), ...(latentData.latent || [])].filter(v => v != null);
        let dlo = Math.min(...demandVals, 0);
        let dhi = Math.max(...demandVals, 1);
        const dSpan = dhi - dlo || 1;
        dlo -= dSpan * 0.08; dhi += dSpan * 0.12;
        const dTicks = niceTicks(dlo, dhi, 5);
        dlo = Math.min(dlo, dTicks[0]); dhi = Math.max(dhi, dTicks[dTicks.length - 1]);
        const y = v => pad.top + (1 - (v - dlo) / (dhi - dlo)) * innerH;

        // Secondary Y for stockout hours (0–24)
        const yStockout = v => pad.top + (1 - v / 24) * innerH;

        const step = Math.max(1, Math.floor(n / 8));
        const xTickIdx = latentData.dates.map((_, i) => i).filter(i => i % step === 0 || i === n - 1);

        const obsPts = (latentData.observed || []).map((v, i) => v != null ? [xs[i], y(v)] : null).filter(Boolean);
        const latPts = (latentData.latent || []).map((v, i) => v != null ? [xs[i], y(v)] : null).filter(Boolean);

        return { innerW, innerH, xs, y, yStockout, dTicks, xTickIdx, n, obsPts, latPts };
      }, [latentData, W]);

      if (!geom) return (
        <div style={{ height: H, display: "grid", placeItems: "center", color: "var(--text-3)", fontFamily: "var(--font-mono)", fontSize: 12 }}>
          Sin datos de demanda latente
        </div>
      );

      return (
        <div ref={wrapRef} style={{ height: H }}>
          <svg width={W} height={H} style={{ display: "block", overflow: "visible" }}>
            {/* Y grid */}
            {geom.dTicks.map((t, i) => (
              <g key={i}>
                <line x1={pad.left} x2={W - pad.right} y1={geom.y(t)} y2={geom.y(t)}
                  stroke="rgba(148,163,184,0.06)" strokeWidth={1} />
                <text x={pad.left - 6} y={geom.y(t) + 3.5} textAnchor="end"
                  fill="var(--text-3)" fontFamily="var(--font-mono)" fontSize={10.5}>
                  {Math.round(t)}
                </text>
              </g>
            ))}

            {/* Secondary Y axis ticks (stockout hours) */}
            {[0, 6, 12, 18, 24].map((t, i) => (
              <g key={`sh${i}`}>
                <text x={W - pad.right + 6} y={geom.yStockout(t) + 3.5} textAnchor="start"
                  fill="var(--c-drift)" fontFamily="var(--font-mono)" fontSize={10} opacity={0.7}>
                  {t}h
                </text>
              </g>
            ))}

            {/* X labels */}
            {geom.xTickIdx.map((i, ki) => (
              <text key={ki} x={geom.xs[i]} y={H - pad.bottom + 16} textAnchor="middle"
                fill="var(--text-3)" fontFamily="var(--font-mono)" fontSize={10}>
                {(latentData.dates[i] || "").slice(5)}
              </text>
            ))}

            {/* Stockout hours bars (amber, secondary axis) */}
            {(latentData.stockout_hours || []).map((v, i) => {
              if (v == null || v <= 0) return null;
              const barH = geom.yStockout(0) - geom.yStockout(v);
              const barW = Math.max(2, geom.innerW / geom.n * 0.7);
              return (
                <rect key={i} x={geom.xs[i] - barW / 2} y={geom.yStockout(v)}
                  width={barW} height={barH}
                  fill="rgba(245,158,11,0.22)" stroke="rgba(245,158,11,0.5)" strokeWidth={0.5} />
              );
            })}

            {/* Observed line (red) */}
            <path d={smoothPath(geom.obsPts)} fill="none" stroke="#ef4444" strokeWidth={2} strokeLinecap="round" />

            {/* Latent line (green) */}
            <path d={smoothPath(geom.latPts)} fill="none" stroke="var(--c-conf)" strokeWidth={2} strokeLinecap="round" />
          </svg>
        </div>
      );
    }

    function ExpParetoChart({ paretoData }) {
      const wrapRef = useRef(null);
      const [W, setW] = useState(700);
      const H = 300;
      const pad = { top: 20, right: 20, bottom: 40, left: 60 };

      useEffect(() => {
        if (!wrapRef.current) return;
        const ro = new ResizeObserver(es => {
          for (const e of es) setW(Math.max(300, Math.floor(e.contentRect.width)));
        });
        ro.observe(wrapRef.current);
        return () => ro.disconnect();
      }, []);

      if (!paretoData || paretoData.length === 0) return (
        <div style={{ padding: 32, color: "var(--text-3)", fontFamily: "var(--font-mono)", fontSize: 12 }}>
          No se encontró pareto_frontier.csv para este experimento.
        </div>
      );

      const costs = paretoData.map(r => r.total_cost).filter(v => v != null);
      const sls = paretoData.map(r => (r.service_level || 0) * 100).filter(v => v != null);
      if (costs.length === 0) return null;

      const innerW = W - pad.left - pad.right;
      const innerH = H - pad.top - pad.bottom;
      const xlo = Math.min(...costs), xhi = Math.max(...costs);
      const ylo = Math.min(...sls), yhi = Math.max(...sls);
      const xSpan = xhi - xlo || 1, ySpan = yhi - ylo || 1;
      const px = v => pad.left + ((v - xlo) / xSpan) * innerW;
      const py = v => pad.top + (1 - (v - ylo) / ySpan) * innerH;

      const xTicks = niceTicks(xlo, xhi, 5);
      const yTicks = niceTicks(ylo, yhi, 5);

      // Color by group
      const COLORS = ["var(--c-inv)", "var(--c-ai)", "var(--c-conf)", "var(--c-drift)", "#f472b6", "#06b6d4"];
      const groups = [...new Set(paretoData.map(r => `${r.data_strategy || ""}|${r.model_name || ""}`))];
      const colorOf = g => COLORS[groups.indexOf(g) % COLORS.length];

      // Pareto frontier line
      const efficient = paretoData
        .filter(r => String(r.is_pareto_efficient).toLowerCase() === "true")
        .sort((a, b) => a.total_cost - b.total_cost);

      const frontierPts = efficient.map(r => [px(r.total_cost), py((r.service_level || 0) * 100)]);

      return (
        <div ref={wrapRef} style={{ height: H }}>
          <svg width={W} height={H} style={{ display: "block", overflow: "visible" }}>
            {/* Grid */}
            {xTicks.map((t, i) => (
              <g key={i}>
                <line x1={px(t)} x2={px(t)} y1={pad.top} y2={pad.top + innerH}
                  stroke="rgba(148,163,184,0.06)" strokeWidth={1} />
                <text x={px(t)} y={H - pad.bottom + 16} textAnchor="middle"
                  fill="var(--text-3)" fontFamily="var(--font-mono)" fontSize={10}>
                  {t >= 1000 ? `${(t/1000).toFixed(1)}k` : Math.round(t)}
                </text>
              </g>
            ))}
            {yTicks.map((t, i) => (
              <g key={i}>
                <line x1={pad.left} x2={pad.left + innerW} y1={py(t)} y2={py(t)}
                  stroke="rgba(148,163,184,0.06)" strokeWidth={1} />
                <text x={pad.left - 6} y={py(t) + 3.5} textAnchor="end"
                  fill="var(--text-3)" fontFamily="var(--font-mono)" fontSize={10}>
                  {t.toFixed(1)}%
                </text>
              </g>
            ))}

            {/* Pareto frontier line */}
            {frontierPts.length > 1 && (
              <path d={smoothPath(frontierPts)} fill="none"
                stroke="var(--c-conf)" strokeWidth={2} strokeDasharray="6 3" strokeLinecap="round" />
            )}

            {/* Scatter points */}
            {paretoData.map((r, i) => {
              const g = `${r.data_strategy || ""}|${r.model_name || ""}`;
              const cx = px(r.total_cost);
              const cy = py((r.service_level || 0) * 100);
              const isEff = String(r.is_pareto_efficient).toLowerCase() === "true";
              return (
                <circle key={i} cx={cx} cy={cy} r={isEff ? 6 : 4}
                  fill={colorOf(g)} opacity={0.8}
                  stroke={isEff ? "#fff" : "none"} strokeWidth={1.5} />
              );
            })}

            {/* Axis labels */}
            <text x={pad.left + innerW / 2} y={H - 4} textAnchor="middle"
              fill="var(--text-3)" fontFamily="var(--font-mono)" fontSize={10.5}>
              Coste Total ($)
            </text>
            <text x={12} y={pad.top + innerH / 2} textAnchor="middle"
              fill="var(--text-3)" fontFamily="var(--font-mono)" fontSize={10.5}
              transform={`rotate(-90, 12, ${pad.top + innerH / 2})`}>
              Nivel de Servicio (%)
            </text>
          </svg>

          {/* Legend */}
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginTop: 6, paddingLeft: pad.left }}>
            {groups.map((g, i) => (
              <div key={g} style={{ display: "flex", alignItems: "center", gap: 5,
                fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text-2)" }}>
                <span style={{ width: 10, height: 10, borderRadius: "50%", background: COLORS[i % COLORS.length] }} />
                {g.replace("|", " / ")}
              </div>
            ))}
            <div style={{ display: "flex", alignItems: "center", gap: 5,
              fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text-2)" }}>
              <span style={{ display: "inline-block", width: 14, height: 2,
                background: "transparent", borderTop: "2px dashed var(--c-conf)" }} />
              Frontera Pareto
            </div>
          </div>
        </div>
      );
    }

    function ExpSensChart({ sensData }) {
      const wrapRef = useRef(null);
      const [W, setW] = useState(700);
      const H = 300;
      const pad = { top: 20, right: 20, bottom: 40, left: 60 };

      useEffect(() => {
        if (!wrapRef.current) return;
        const ro = new ResizeObserver(es => {
          for (const e of es) setW(Math.max(300, Math.floor(e.contentRect.width)));
        });
        ro.observe(wrapRef.current);
        return () => ro.disconnect();
      }, []);

      if (!sensData || sensData.length === 0) return (
        <div style={{ padding: 32, color: "var(--text-3)", fontFamily: "var(--font-mono)", fontSize: 12 }}>
          No se encontró sensitivity_summary.csv para este experimento.
        </div>
      );

      const ratios = sensData.map(r => r.ratio).filter(v => v != null);
      const costs = sensData.map(r => r.total_cost).filter(v => v != null);
      if (ratios.length === 0) return null;

      const innerW = W - pad.left - pad.right;
      const innerH = H - pad.top - pad.bottom;
      const xlo = Math.min(...ratios), xhi = Math.max(...ratios);
      const ylo = Math.min(...costs), yhi = Math.max(...costs);
      const xSpan = xhi - xlo || 1, ySpan = yhi - ylo || 1;
      const px = v => pad.left + ((v - xlo) / xSpan) * innerW;
      const py = v => pad.top + (1 - (v - ylo) / ySpan) * innerH;

      const xTicks = niceTicks(xlo, xhi, 5);
      const yTicks = niceTicks(ylo, yhi, 5);

      const COLORS = ["var(--c-inv)", "var(--c-ai)", "var(--c-conf)", "var(--c-drift)", "#f472b6", "#06b6d4"];

      // Group by data_strategy + model_name
      const groupMap = {};
      sensData.forEach(r => {
        const key = `${r.data_strategy || ""}|${r.model_name || ""}`;
        if (!groupMap[key]) groupMap[key] = [];
        groupMap[key].push(r);
      });
      const groups = Object.entries(groupMap);

      return (
        <div ref={wrapRef} style={{ height: H }}>
          <svg width={W} height={H} style={{ display: "block", overflow: "visible" }}>
            {xTicks.map((t, i) => (
              <g key={i}>
                <line x1={px(t)} x2={px(t)} y1={pad.top} y2={pad.top + innerH}
                  stroke="rgba(148,163,184,0.06)" strokeWidth={1} />
                <text x={px(t)} y={H - pad.bottom + 16} textAnchor="middle"
                  fill="var(--text-3)" fontFamily="var(--font-mono)" fontSize={10}>
                  {t.toFixed(1)}
                </text>
              </g>
            ))}
            {yTicks.map((t, i) => (
              <g key={i}>
                <line x1={pad.left} x2={pad.left + innerW} y1={py(t)} y2={py(t)}
                  stroke="rgba(148,163,184,0.06)" strokeWidth={1} />
                <text x={pad.left - 6} y={py(t) + 3.5} textAnchor="end"
                  fill="var(--text-3)" fontFamily="var(--font-mono)" fontSize={10}>
                  {t >= 1000 ? `${(t/1000).toFixed(1)}k` : Math.round(t)}
                </text>
              </g>
            ))}

            {groups.map(([key, rows], gi) => {
              const sorted = [...rows].sort((a, b) => a.ratio - b.ratio);
              const pts = sorted.map(r => [px(r.ratio), py(r.total_cost)]);
              return (
                <g key={key}>
                  <path d={smoothPath(pts)} fill="none"
                    stroke={COLORS[gi % COLORS.length]} strokeWidth={2} strokeLinecap="round" />
                  {pts.map(([x, y], i) => (
                    <circle key={i} cx={x} cy={y} r={3} fill={COLORS[gi % COLORS.length]} />
                  ))}
                </g>
              );
            })}

            <text x={pad.left + innerW / 2} y={H - 4} textAnchor="middle"
              fill="var(--text-3)" fontFamily="var(--font-mono)" fontSize={10.5}>
              Ratio Cs/Co
            </text>
            <text x={12} y={pad.top + innerH / 2} textAnchor="middle"
              fill="var(--text-3)" fontFamily="var(--font-mono)" fontSize={10.5}
              transform={`rotate(-90, 12, ${pad.top + innerH / 2})`}>
              Coste Total ($)
            </text>
          </svg>

          <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginTop: 6, paddingLeft: pad.left }}>
            {groups.map(([key], i) => (
              <div key={key} style={{ display: "flex", alignItems: "center", gap: 5,
                fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text-2)" }}>
                <span style={{ display: "inline-block", width: 14, height: 2, background: COLORS[i % COLORS.length] }} />
                {key.replace("|", " / ")}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ── ExperimentsView main component ────────────────────────────────────────
    function ExperimentsView() {
      const [selectedRun, setSelectedRun] = useState("");
      const [selectedStrategy, setSelectedStrategy] = useState("");
      const [selectedSeries, setSelectedSeries] = useState("");
      const [selectedModel, setSelectedModel] = useState("");
      const [subTab, setSubTab] = useState("forecast");

      // What-if panel state
      const [wiOpen, setWiOpen] = useState(false);
      const [cOver, setCOver] = useState(1.0);
      const [cUnder, setCUnder] = useState(4.0);
      const [wiCapacity, setWiCapacity] = useState("");
      const [wiResult, setWiResult] = useState(null);
      const [wiLoading, setWiLoading] = useState(false);

      // API data
      const { data: runs, loading: runsLoading } = useApi("/api/runs", []);
      const { data: filters, loading: filtersLoading } = useApi(
        selectedRun ? `/api/runs/${encodeURIComponent(selectedRun)}/filters` : null,
        [selectedRun]
      );
      const { data: summary, loading: summaryLoading } = useApi(
        selectedRun ? `/api/runs/${encodeURIComponent(selectedRun)}/summary` : null,
        [selectedRun]
      );

      const chartUrl = useMemo(() => {
        if (!selectedRun) return null;
        const p = new URLSearchParams();
        if (selectedStrategy) p.set("strategy", selectedStrategy);
        if (selectedSeries) p.set("series_id", selectedSeries);
        if (selectedModel) p.set("model", selectedModel);
        return `/api/runs/${encodeURIComponent(selectedRun)}/chart?${p}`;
      }, [selectedRun, selectedStrategy, selectedSeries, selectedModel]);

      const { data: chartData, loading: chartLoading } = useApi(chartUrl, [chartUrl]);

      const latentUrl = useMemo(() => {
        if (!selectedRun || !filters?.has_latent) return null;
        const p = new URLSearchParams();
        if (selectedSeries) p.set("series_id", selectedSeries);
        if (selectedModel) p.set("model", selectedModel);
        return `/api/runs/${encodeURIComponent(selectedRun)}/latent?${p}`;
      }, [selectedRun, filters, selectedSeries, selectedModel]);

      const { data: latentData, loading: latentLoading } = useApi(latentUrl, [latentUrl]);

      const { data: paretoData, loading: paretoLoading } = useApi(
        selectedRun && subTab === "pareto" ? `/api/runs/${encodeURIComponent(selectedRun)}/pareto` : null,
        [selectedRun, subTab]
      );
      const { data: sensData, loading: sensLoading } = useApi(
        selectedRun && subTab === "pareto" ? `/api/runs/${encodeURIComponent(selectedRun)}/sensitivity` : null,
        [selectedRun, subTab]
      );

      // Auto-select first option when filters load
      useEffect(() => {
        if (!filters) return;
        if (filters.strategies?.length) setSelectedStrategy(filters.strategies[0]);
        if (filters.series_ids?.length) setSelectedSeries(filters.series_ids[0]);
        if (filters.models?.length) setSelectedModel(filters.models[0]);
      }, [filters]);

      // Compute KPIs from summary
      const kpis = useMemo(() => {
        if (!summary || !selectedModel) return null;
        const m = (summary.metrics || []).find(r =>
          r.model_name === selectedModel &&
          (!selectedStrategy || r.data_strategy === selectedStrategy)
        );
        const c = (summary.costs || []).find(r =>
          r.model_name === selectedModel &&
          (!selectedStrategy || r.data_strategy === selectedStrategy)
        );
        if (!m && !c) return null;
        const coverage = m?.interval_coverage ?? m?.coverage_q_0_1_q_0_9 ?? null;
        return {
          totalCost: c?.sim_total_cost ?? c?.total_cost ?? null,
          mae: m?.mae ?? null,
          coverage: coverage != null ? coverage * 100 : null,
          serviceLevel: c?.sim_service_level ?? c?.service_level ?? null,
        };
      }, [summary, selectedModel, selectedStrategy]);

      const handleWhatIf = async () => {
        if (!selectedRun || !selectedModel) return;
        setWiLoading(true);
        setWiResult(null);
        try {
          const r = await fetch(`/api/runs/${encodeURIComponent(selectedRun)}/whatif`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model_name: selectedModel,
              data_strategy: selectedStrategy || "Observed",
              series_id: selectedSeries || null,
              c_over: cOver,
              c_under: cUnder,
              capacity: wiCapacity ? parseInt(wiCapacity, 10) : null,
            }),
          });
          if (r.ok) setWiResult(await r.json());
        } finally {
          setWiLoading(false);
        }
      };

      const selectStyle = {
        background: "var(--surface)",
        border: "1px solid var(--border-2)",
        color: "var(--text-1)",
        borderRadius: 8,
        padding: "7px 10px",
        fontFamily: "var(--font-mono)",
        fontSize: 12,
        cursor: "pointer",
        minWidth: 160,
      };

      const labelStyle = {
        fontFamily: "var(--font-mono)",
        fontSize: 11,
        color: "var(--text-3)",
        marginBottom: 4,
        letterSpacing: "0.04em",
        textTransform: "uppercase",
      };

      // ── render ──
      if (!selectedRun && !runsLoading && (!runs || runs.length === 0)) return (
        <div style={{ padding: 48, textAlign: "center", color: "var(--text-3)" }}>
          <div style={{ fontSize: 36, marginBottom: 12 }}>📂</div>
          <div style={{ fontFamily: "var(--font-mono)", fontSize: 14 }}>
            No se encontraron experimentos en <code>reports/</code>. Ejecuta un experimento primero.
          </div>
        </div>
      );

      return (
        <div>
          {/* ── Filter bar ── */}
          <div className="glass" style={{ padding: "14px 18px", marginBottom: 18 }}>
            <div style={{ display: "flex", gap: 16, flexWrap: "wrap", alignItems: "flex-end" }}>
              {/* Run selector */}
              <div>
                <div style={labelStyle}>Ejecución (Run)</div>

                  <div style={labelStyle}>Capacidad (u)</div>

                      color: subTab === t.id ? "#fff" : "var(--text-2)",
                      borderColor: subTab === t.id ? "rgba(139,92,246,0.45)" : "var(--border)" }}>
                    <Icon name={t.icon} size={13} />

              {subTab === "forecast" && (

                  {/* KPI strip */}
                  {summaryLoading ? (
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 12, marginBottom: 16 }}>
                      {[1,2,3,4].map(i => (
                        <div key={i} className="shimmer" style={{ height: 72, borderRadius: 10 }} />
                      ))}
                    </div>
                  ) : kpis ? (
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px,1fr))",
                      gap: 12, marginBottom: 16 }}>
                      {[
                        { label: "Coste Total", value: kpis.totalCost != null ? `$${kpis.totalCost.toFixed(2)}` : "—", color: "var(--c-inv)" },
                        { label: "MAE", value: kpis.mae != null ? kpis.mae.toFixed(3) : "—", color: "var(--c-ai)" },
                        { label: "Cobertura Conformal", value: kpis.coverage != null ? `${kpis.coverage.toFixed(1)}%` : "—", color: "var(--c-conf)" },
                        { label: "Nivel de Servicio", value: kpis.serviceLevel != null ? `${(kpis.serviceLevel * 100).toFixed(1)}%` : "—", color: "var(--c-drift)" },
                      ].map(({ label, value, color }) => (
                        <div key={label} className="glass" style={{ padding: "12px 16px" }}>
                          <div style={{ fontFamily: "var(--font-mono)", fontSize: 10.5,
                            color: "var(--text-3)", textTransform: "uppercase",
                            letterSpacing: "0.05em", marginBottom: 6 }}>
                            {label}
                          </div>
                          <div style={{ fontFamily: "var(--font-display)", fontSize: 22,
                            fontWeight: 700, color }}>
                            {value}
                          </div>
                        </div>
                      ))}
                    </div>
                  ) : null}

                  {/* Drift alert banner */}
                  {filters && (
                    <div style={{
                      padding: "10px 16px", borderRadius: 10, marginBottom: 14,
                      borderLeft: `4px solid ${filters.drift_alert ? "#ef4444" : "var(--c-conf)"}`,
                      background: filters.drift_alert ? "rgba(239,68,68,0.06)" : "rgba(16,185,129,0.06)",
                      color: filters.drift_alert ? "#ef4444" : "var(--c-conf)",
                      fontFamily: "var(--font-mono)", fontSize: 12,
                    }}>
                      {filters.drift_alert
                        ? `⚠ Drift detectado: ${filters.drift_alert}`
                        : "✓ Sin drift detectado en esta ejecución"}

                  )}

                  {/* Forecast chart */}
                  <div className="glass" style={{ padding: "18px 18px 14px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between",
                      alignItems: "center", marginBottom: 10, flexWrap: "wrap", gap: 8 }}>
                      <div>
                        <div className="h-display" style={{ fontSize: 16 }}>Pronóstico vs Realidad</div>
                        <div style={{ fontSize: 11, color: "var(--text-3)", marginTop: 2 }}>
                          Intervalo conformal · pedidos sugeridos · escenario what-if
                        </div>
                      </div>
                      <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
                        <Legend2 color="var(--c-inv)" label="Real" />
                        <Legend2 color="var(--c-ai)" label="Predicción" dashed />
                        <Legend2 color="rgba(148,163,184,0.3)" label="Intervalo" square />
                        <div style={{ display: "flex", alignItems: "center", gap: 5,
                          fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text-2)" }}>
                          <span style={{ color: "#ef4444", fontSize: 12 }}>◆</span> Pedido base
                        </div>
                        {wiResult && (
                          <div style={{ display: "flex", alignItems: "center", gap: 5,
                            fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text-2)" }}>
                            <span style={{ color: "#f59e0b", fontSize: 12 }}>★</span> What-If
                          </div>
                        )}
                      </div>
                    </div>

                    {chartLoading ? (
                      <div className="shimmer" style={{ height: 320, borderRadius: 8 }} />
                    ) : (
                      <ExpForecastChart
                        chartData={chartData}
                        whatifOrders={(() => {
                          if (!wiResult || !wiResult.whatif_orders || !chartData) return null;
                          const wo = wiResult.whatif_orders;
                          if (!wo.dates || wo.dates.length === 0) return null;
                          const m = new Map(wo.dates.map((d, i) => [d, wo.order_quantity[i]]));
                          return (chartData.dates || []).map(d => m.has(d) ? m.get(d) : null);
                        })()}
                      />
                    )}
                  </div>
                </div>
              )}

              {/* ── Sub-tab: Demanda Latente ── */}
              {subTab === "latent" && (
                <div className="glass" style={{ padding: "18px 18px 14px" }}>
                  <div style={{ marginBottom: 12 }}>
                    <div className="h-display" style={{ fontSize: 16 }}>Imputación de Demanda Latente</div>
                    <div style={{ fontSize: 11, color: "var(--text-3)", marginTop: 2 }}>
                      Horas de rotura de stock · venta registrada (censurada) · demanda latente imputada

                  </div>

                  {!filters?.has_latent ? (
                    <div style={{ padding: 32, color: "var(--text-3)", fontFamily: "var(--font-mono)", fontSize: 12 }}>
                      Esta ejecución no contiene datos de imputación de demanda latente.
                      Selecciona una ejecución que incluya estrategia Latent_.
                    </div>
                  ) : latentLoading ? (
                    <div className="shimmer" style={{ height: 300, borderRadius: 8 }} />
                  ) : (
                    <>
                      <div style={{ display: "flex", gap: 14, marginBottom: 10, flexWrap: "wrap" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 5,

                          <span style={{ width: 10, height: 10, borderRadius: 2,
                            background: "rgba(245,158,11,0.4)" }} /> Horas de rotura (eje der.)
                        </div>
                        <Legend2 color="#ef4444" label="Venta real (censurada)" />
                        <Legend2 color="var(--c-conf)" label="Demanda latente imputada" />
                      </div>
                      <ExpLatentChart latentData={latentData || { dates: [], stockout_hours: [], observed: [], latent: [] }} />
                    </>
                  )}
                </div>
              )}

              {/* ── Sub-tab: Pareto & Sensibilidad ── */}
              {subTab === "pareto" && (
                <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                  <div className="glass" style={{ padding: "18px 18px 14px" }}>
                    <div style={{ marginBottom: 12 }}>
                      <div className="h-display" style={{ fontSize: 16 }}>Frontera de Pareto</div>
                      <div style={{ fontSize: 11, color: "var(--text-3)", marginTop: 2 }}>
                        Nivel de servicio vs coste total · puntos eficientes destacados
                      </div>
                    </div>
                    {paretoLoading ? (
                      <div className="shimmer" style={{ height: 300, borderRadius: 8 }} />
                    ) : (
                      <ExpParetoChart paretoData={paretoData || []} />
                    )}
                  </div>

                  <div className="glass" style={{ padding: "18px 18px 14px" }}>
                    <div style={{ marginBottom: 12 }}>
                      <div className="h-display" style={{ fontSize: 16 }}>Sensibilidad a Ratio Cs/Co</div>
                      <div style={{ fontSize: 11, color: "var(--text-3)", marginTop: 2 }}>
                        Coste total de inventario en función del ratio de penalización por modelo
                      </div>
                    </div>
                    {sensLoading ? (
                      <div className="shimmer" style={{ height: 300, borderRadius: 8 }} />
                    ) : (
                      <ExpSensChart sensData={sensData || []} />
                    )}
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════
    // ConfigModal — YAML config editor
    // ═══════════════════════════════════════════════════════════════════════
    function ConfigModal({ onClose, onRunPipeline }) {
      const [yaml, setYaml] = useState("");
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [error, setError] = useState(null);
      const [saved, setSaved] = useState(false);

      useEffect(() => {
        const onKey = (e) => { if (e.key === "Escape") onClose(); };
        document.addEventListener("keydown", onKey);
        const prev = document.body.style.overflow;
        document.body.style.overflow = "hidden";
        return () => {
          document.removeEventListener("keydown", onKey);
          document.body.style.overflow = prev;
        };
      }, [onClose]);

      useEffect(() => {
        fetch("/api/config")
          .then(r => r.json())
          .then(d => { setYaml(d.yaml); setLoading(false); })
          .catch(() => { setError("No se pudo cargar la configuración."); setLoading(false); });
      }, []);

      const save = async (andRun = false) => {
        setError(null);
        setSaving(true);
        try {
          const res = await fetch("/api/config", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ yaml }),
          });
          const data = await res.json();
          if (!res.ok) {
            setError(data.detail || "Error al guardar la configuración.");
            setSaving(false);
            return;
          }
          setSaved(true);
          setTimeout(() => setSaved(false), 2000);
          if (andRun) {
            onClose();
            onRunPipeline?.();
          }
        } catch (e) {
          setError("Error de red al guardar.");
        } finally {
          setSaving(false);
        }
      };

      return (
        <div className="modal-backdrop" onClick={onClose}>
          <div
            className="modal-window"
            style={{ width: "min(720px, 100%)", maxHeight: "90vh", display: "flex", flexDirection: "column" }}
            onClick={e => e.stopPropagation()}
          >
            {/* Header */}
            <div style={{
              display: "flex",
              alignItems: "center",
              justifyContent: "space-between",
              padding: "20px 24px 16px",
              borderBottom: "1px solid var(--border)"
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <Icon name="settings" size={16} stroke="var(--c-ai)" />
                <span style={{ fontSize: 14.5, fontWeight: 600, color: "#fff", letterSpacing: "0.01em" }}>
                  Configuración del Pipeline
                </span>
              </div>
              <button className="modal-close" onClick={onClose} aria-label="Cerrar" />
            </div>

            {/* Body */}
            <div style={{ flex: 1, padding: "20px 24px", overflowY: "auto" }}>
              {loading ? (
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {[1,2,3,4,5].map(i => (
                    <div key={i} className="shimmer" style={{ height: 18, borderRadius: 4, width: i % 2 === 0 ? "70%" : "100%" }} />
                  ))}
                </div>
              ) : (
                <textarea
                  value={yaml}
                  onChange={e => setYaml(e.target.value)}
                  spellCheck={false}
                  style={{
                    background: "#060810",
                    color: "#e7ecf3",
                    fontFamily: "'JetBrains Mono', monospace",
                    fontSize: "12.5px",
                    lineHeight: 1.65,
                    border: "1px solid var(--border-2)",
                    borderRadius: 8,
                    padding: "14px 16px",
                    width: "100%",
                    height: 500,
                    resize: "vertical",
                    outline: "none",
                    boxSizing: "border-box"
                  }}
                />
              )}

              {error && (
                <div style={{
                  marginTop: 12,
                  padding: "10px 14px",
                  borderRadius: 8,
                  background: "rgba(239, 68, 68, 0.08)",
                  border: "1px solid rgba(239, 68, 68, 0.25)",
                  borderLeft: "4px solid #ef4444",
                  color: "#fca5a5",
                  fontSize: 12.5,
                  fontFamily: "var(--font-mono)",
                  whiteSpace: "pre-wrap",
                  wordBreak: "break-word"
                }}>
                  {error}
                </div>
              )}

              {saved && (
                <div style={{
                  marginTop: 12,
                  padding: "8px 14px",
                  borderRadius: 8,
                  background: "rgba(16, 185, 129, 0.08)",
                  border: "1px solid rgba(16, 185, 129, 0.3)",
                  borderLeft: "4px solid #10b981",
                  color: "#6ee7b7",
                  fontSize: 12.5
                }}>
                  ✓ Guardado
                </div>
              )}
            </div>

            {/* Footer */}
            <div style={{
              display: "flex",
              justifyContent: "flex-end",
              gap: 10,
              padding: "16px 24px 20px",
              borderTop: "1px solid var(--border)"
            }}>
              <button
                className="btn-run"
                onClick={onClose}
                style={{
                  fontSize: 12.5,
                  padding: "8px 18px",
                  borderColor: "var(--border)",
                  background: "rgba(255,255,255,0.02)"
                }}
              >
                Cancelar
              </button>
              <button
                className="btn-run"
                onClick={() => save(false)}
                disabled={saving || loading}
                style={{
                  fontSize: 12.5,
                  padding: "8px 18px",
                  borderColor: "rgba(139, 92, 246, 0.45)",
                  background: "rgba(139, 92, 246, 0.1)"
                }}
              >
                {saving ? "Guardando…" : "Guardar"}
              </button>
              <button
                className="btn-run"
                onClick={() => save(true)}
                disabled={saving || loading}
                style={{
                  fontSize: 12.5,
                  padding: "8px 18px",
                  borderColor: "rgba(16, 185, 129, 0.45)",
                  background: "rgba(16, 185, 129, 0.1)"
                }}
              >
                {saving ? "Guardando…" : "Guardar y Ejecutar"}
              </button>
            </div>
          </div>
        </div>
      );
    }

      const [password, setPassword] = React.useState("");
      const [error, setError] = React.useState(null);

            onLogin();

                    width: "100%", boxSizing: "border-box", padding: "10px 14px",
                    background: "var(--bg-1)", border: "1px solid var(--border-2)",
                    borderRadius: 8, color: "var(--text-1)", fontSize: 13,
                    fontFamily: "var(--font-sans)", outline: "none",
                    transition: "border-color 0.15s"
                  }}
                  onFocus={e => e.target.style.borderColor = "var(--c-ai)"}
                  onBlur={e => e.target.style.borderColor = "var(--border-2)"}
                />
              </div>
              <div>
                <label style={{ display: "block", fontSize: 11.5, color: "var(--text-3)", marginBottom: 6, fontFamily: "var(--font-mono)", letterSpacing: "0.06em", textTransform: "uppercase" }}>
                  Contraseña
                </label>
                <input
                  type="password" autoComplete="current-password" required
                  value={password} onChange={e => setPassword(e.target.value)}
                  style={{
                    width: "100%", boxSizing: "border-box", padding: "10px 14px",
                    background: "var(--bg-1)", border: "1px solid var(--border-2)",
                    borderRadius: 8, color: "var(--text-1)", fontSize: 13,
                    fontFamily: "var(--font-sans)", outline: "none",
                    transition: "border-color 0.15s"

                  onFocus={e => e.target.style.borderColor = "var(--c-ai)"}
                  onBlur={e => e.target.style.borderColor = "var(--border-2)"}
                />
              </div>

              {error && (
                <div style={{
                  padding: "10px 14px", borderRadius: 8, fontSize: 12.5,
                  background: "rgba(245,158,11,0.1)", border: "1px solid rgba(245,158,11,0.3)",
                  color: "var(--c-drift)"
                }}>
                  {error}
                </div>
              )}

              <button
                type="submit" disabled={loading}
                className="btn-run"
                style={{
                  marginTop: 4, padding: "11px 0",
                  borderColor: "rgba(139,92,246,0.5)",
                  background: "linear-gradient(135deg, rgba(139,92,246,0.25), rgba(59,130,246,0.15))",
                  fontSize: 13.5, fontWeight: 600,
                  opacity: loading ? 0.6 : 1
                }}
              >
                {loading ? "Verificando…" : "Iniciar sesión"}
              </button>
            </form>
          </div>
        </div>
      );
    }

    function App() {
      const [authed, setAuthed] = React.useState(null); // null=checking, true/false
      const [params, setParams] = useState({
        serviceLevel: 95,
        shortageCost: 18,
        holdingCost: 4,
        capacity: 12000,
      });
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [lastRunAt, setLastRunAt] = useState(null);
      const [alerts, setAlerts] = useState(SEED_ALERTS);
      const [alertsOpen, setAlertsOpen] = useState(false);
      const [configOpen, setConfigOpen] = useState(false);
      const [activeTab, setActiveTab] = useState("dashboard");
      const [selectedSkuId, setSelectedSkuId] = useState(null);
      const [tabTransitioning, setTabTransitioning] = useState(false);
      const debounceRef = useRef(null);

      const changeTab = (tabId) => {
        if (tabId === activeTab) return;
        setTabTransitioning(true);
        setTimeout(() => {
          setActiveTab(tabId);
          setTimeout(() => {
            setTabTransitioning(false);
          }, 60);
        }, 180);
      };

      const [toasts, setToasts] = useState([]);
      const [pipelineRunning, setPipelineRunning] = useState(false);
      const [pipelineError, setPipelineError] = useState(null);

      const [isConsoleOpen, setIsConsoleOpen] = useState(false);
      const [consoleLogs, setConsoleLogs] = useState("");
      const [consoleStatus, setConsoleStatus] = useState("idle");
      const [consoleError, setConsoleError] = useState(null);
      const consoleBodyRef = useRef(null);

      const showToast = useCallback((title, message, type = "warning") => {
        const id = Date.now() + Math.random().toString(36).substr(2, 9);
        setToasts(prev => [...prev.filter(t => t.title !== title), { id, title, message, type }]);
        setTimeout(() => {
          setToasts(prev => prev.filter(t => t.id !== id));
        }, 5000);
      }, []);

      // Auth check on mount
      useEffect(() => {
        fetch("/api/auth/check", { credentials: "same-origin" })
          .then(r => setAuthed(r.ok))
          .catch(() => setAuthed(false));
      }, []);

      const handleLogout = async () => {
        await fetch("/api/logout", { method: "POST", credentials: "same-origin" });
        setAuthed(false);
      };

      useEffect(() => {
        if (!data) return;

        // 1. Capacity Saturation Toast
        const util = data.recommendation?.utilization ?? 0;
        if (util >= 95) {
          showToast(
            "Capacidad Crítica",
            `Saturación del almacén al ${util}%: Restricciones de espacio activas en solver LP.`,
            "critical"
          );
        }

        // 2. Service Level Bound Toast
        if (params.serviceLevel < 88) {
          showToast(
            "Riesgo de Rotura",
            `Nivel de servicio objetivo bajo (${params.serviceLevel}%): Alto riesgo de quiebre de stock.`,
            "warning"
          );
        }

        // 3. Drift PSI Toast
        const psi = data.kpis?.driftPSI?.value ?? 0;
        if (psi > 0.20) {
          showToast(
            "Feature Drift Crítico",
            `PSI general de features en ${psi.toFixed(2)}: Desviación temporal detectada. Recalibrar.`,
            "drift"
          );
        }
      }, [data, params.serviceLevel, showToast]);

      const currentAlerts = data?.status === "no_predictions" ? [] : alerts;
      const unreadAlerts = currentAlerts.filter(a => !a.read).length;

      // Real alerts fetching
      useEffect(() => {
        const loadAlerts = async () => {
          try {
            const data = await api.fetch("/api/alerts", params);
            if (data && Array.isArray(data)) {
              setAlerts(data);
            }
          } catch (e) {
            console.error(e);
          }
        };
        loadAlerts();
      }, [params]);

      // Initial load + debounced reload on param changes (simulates fetch /api/forecast & /api/kpis)
      const reload = useCallback(async (latency = 650) => {
        setLoading(true);
        const res = await api.fetch("/api/forecast", { ...params, selectedSkuId }, latency);
        setData(res);
        setLoading(false);
        const t = new Date();
        setLastRunAt(t.toTimeString().slice(0, 8));
      }, [params]);

      // Initial load (slightly longer to show the skeleton)
      useEffect(() => {
        reload(900);
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, []);

      // Auto-refresh as the user drags sliders (debounced)
      useEffect(() => {
        if (debounceRef.current) clearTimeout(debounceRef.current);
        debounceRef.current = setTimeout(() => reload(400), 280);
        return () => clearTimeout(debounceRef.current);
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [params]);

      // Auto scroll console logs to bottom when updated
      useEffect(() => {
        if (consoleBodyRef.current) {
          consoleBodyRef.current.scrollTop = consoleBodyRef.current.scrollHeight;
        }
      }, [consoleLogs]);

      // Polling logic for status
      useEffect(() => {
        if (!isConsoleOpen || consoleStatus !== "running") return;

        let interval = setInterval(async () => {
          try {
            const res = await fetch("/api/run/status");
            if (!res.ok) throw new Error("Failed to fetch status");
            const result = await res.json();

            setConsoleLogs(result.logs || "");
            setConsoleStatus(result.status);
            if (result.status === "success") {
              clearInterval(interval);
              showToast(
                "¡Éxito!",
                "El pipeline se ha ejecutado exitosamente. Recargando datos...",
                "conformal"
              );
              await reload(800);
            } else if (result.status === "failed") {
              clearInterval(interval);
              setConsoleError(result.error || "La ejecución del pipeline falló.");
              showToast(
                "Error en Pipeline",
                "Hubo un fallo durante la ejecución del experimento.",
                "critical"
              );
            }
          } catch (err) {
            console.error("Error polling pipeline status:", err);
          }
        }, 1000);

        return () => clearInterval(interval);
      }, [isConsoleOpen, consoleStatus, reload, showToast]);

      // Fetch status on opening
      useEffect(() => {
        if (!isConsoleOpen) return;

        const checkCurrentStatus = async () => {
          try {
            const res = await fetch("/api/run/status");
            if (res.ok) {
              const result = await res.json();
              setConsoleLogs(result.logs || "");
              setConsoleStatus(result.status);
              setConsoleError(result.error);
            }
          } catch (err) {
            console.error("Error fetching initial status:", err);
          }
        };

        checkCurrentStatus();
      }, [isConsoleOpen]);

      const startPipelineRun = async () => {
        setConsoleStatus("running");
        setConsoleError(null);
        setConsoleLogs("Iniciando pipeline de forecasting e inventario en background...\n");
        try {
          const res = await fetch("/api/run", {
            method: "POST"
          });
          const result = await res.json();
          if (res.ok && result.status === "running") {
            setConsoleLogs(prev => prev + "Proceso de background lanzado con éxito. Leyendo logs en tiempo real...\n\n");
          } else {
            setConsoleStatus("failed");
            setConsoleError(result.detail || "No se pudo iniciar el pipeline.");
            setConsoleLogs(prev => prev + `[ERROR] ${result.detail || "No se pudo iniciar el pipeline."}\n`);
          }
        } catch (err) {
          console.error(err);
          setConsoleStatus("failed");
          setConsoleError("Error de red: No se pudo conectar con la API.");
          setConsoleLogs(prev => prev + `[ERROR] Error de red al iniciar: ${err.message}\n`);
        }
      };

      const handleRunPipeline = () => {
        setIsConsoleOpen(true);
        if (consoleStatus !== "running") {
          startPipelineRun();
        }
      };

      // When in no_predictions state, check if a previous run failed and surface the error
      useEffect(() => {
        if (data?.status !== "no_predictions" || consoleStatus === "running") return;
        fetch("/api/run/status")
          .then(r => r.ok ? r.json() : null)
          .then(result => {
            if (result?.status === "failed" && result?.error) {
              setConsoleError(result.error);
            }
          })
          .catch(() => {});
      }, [data?.status]);

      const handleRun = () => {
        if (data?.status === "no_predictions") {
          handleRunPipeline();
        } else {
          reload(750);
        }
      };

      const handleAction = (a) => {
        if (data?.status === "no_predictions") {
          handleRunPipeline();
        } else {
          reload(550);
        }
      };

      if (authed === null) return (
        <div style={{ minHeight: "100vh", display: "grid", placeItems: "center", background: "var(--bg-0)" }}>
          <div style={{ width: 36, height: 36, borderRadius: "50%", border: "3px solid var(--border-2)", borderTopColor: "var(--c-ai)", animation: "spin 0.8s linear infinite" }} />
        </div>
      );
      if (!authed) return <LoginScreen onLogin={() => setAuthed(true)} />;

      return (
        <div className="app">
          <Sidebar
            params={params}
            setParams={setParams}
            onRun={handleRun}
            running={loading}
            lastRunAt={lastRunAt}
            onRunPipeline={handleRunPipeline}
            dataStatus={data?.status}
            onOpenConfig={() => setConfigOpen(true)}
            onLogout={handleLogout}
          />
          <main className="canvas canvas-bg">
            <div className={`premium-loading-bar ${tabTransitioning ? "active" : ""}`} />
            <div className={`canvas-content ${tabTransitioning ? "canvas-transitioning" : ""}`}>
              <TopBar
              params={params}
              lastRunAt={lastRunAt}
              unreadAlerts={unreadAlerts}
              onOpenAlerts={() => setAlertsOpen(true)}
              onRefresh={handleRun}
            />

            {data?.status === "no_predictions" ? (
              <EmptyState
                onRunPipeline={handleRunPipeline}
                running={consoleStatus === "running"}
                error={consoleError}
              />
            ) : (
              <>
                {/* Premium Tab Navigation Bar */}
                <div style={{
                  display: "flex",
                  gap: 8,
                  borderBottom: "1px solid var(--border)",
                  paddingBottom: 16,
                  marginBottom: 20
                }}>
                  {[
                    { id: "dashboard", label: "Dashboard General", icon: "activity" },
                    { id: "skus", label: "Análisis SKU", icon: "package" },
                    { id: "drift", label: "Monitor de Drift", icon: "zap" },
                    { id: "experiments", label: "Experimentos", icon: "layers" }
                  ].map(t => (
                    <button
                      key={t.id}
                      className={`filter-tab ${activeTab === t.id ? "active" : ""}`}
                      onClick={() => changeTab(t.id)}
                      style={{
                        display: "flex",
                        alignItems: "center",
                        gap: 8,
                        fontSize: 12.5,
                        padding: "10px 16px",
                        borderRadius: "8px",
                        background: activeTab === t.id ? "rgba(139, 92, 246, 0.12)" : "rgba(255,255,255,0.02)",
                        color: activeTab === t.id ? "#fff" : "var(--text-2)",
                        borderColor: activeTab === t.id ? "rgba(139, 92, 246, 0.45)" : "var(--border)"
                      }}
                    >
                      <Icon name={t.icon} size={14} />
                      {t.label}
                    </button>
                  ))}
                </div>

                {activeTab === "dashboard" && (
                  <>
                    <KpiGrid data={data} loading={loading || !data} />

                    <div style={{ marginTop: 16 }}>
                      <ChartBlock
                        data={data}
                        loading={loading || !data}
                        params={params}
                        recommendation={data?.recommendation || { qStar: 0, z: 0, criticalRatio: 0, utilization: 0 }}
                      />
                    </div>

                    <div style={{ marginTop: 24, marginBottom: 10 }}>
                      <div className="label-mono" style={{ marginBottom: 4 }}>módulos académicos · defensa TFG</div>
                      <div className="h-display" style={{ fontSize: 18, color: "var(--text-1)" }}>
                        Fundamentos matemáticos
                      </div>
                    </div>
                    <AcademicGrid
                      params={params}
                      recommendation={data?.recommendation || { qStar: 0, z: 0, criticalRatio: 0, utilization: 0 }}
                    />
                  </>
                )}

                {activeTab === "skus" && (
                  <SkuView
                    params={params}
                    loading={loading}
                    selectedSkuId={selectedSkuId}
                    onSelectSku={(skuId) => {
                      setTabTransitioning(true);
                      setTimeout(() => {
                        setSelectedSkuId(skuId);
                        if (skuId) {
                          setActiveTab("dashboard");
                        }
                        setTimeout(() => {
                          setTabTransitioning(false);
                        }, 60);
                      }, 180);
                    }}
                  />
                )}

                {activeTab === "drift" && (
                  <DriftView params={params} />
                )}

                {activeTab === "experiments" && (
                  <ExperimentsView />
                )}
              </>
            )}

            <div style={{
              marginTop: 28,
              padding: "14px 16px",
              background: "rgba(0,0,0,0.18)",
              border: "1px dashed var(--border)",
              borderRadius: 10,
              fontFamily: "var(--font-mono)",
              fontSize: 11,
              color: "var(--text-3)",
              display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 8
            }}>
              <span>
                GET /api/forecast?h=30 · GET /api/kpis · POST /api/optimize · GET /api/alerts
              </span>
              <span>
                fastapi 0.110 · uvicorn · python 3.11
              </span>
            </div>
          </div>
        </main>

          {alertsOpen && (
            <AlertsPanel
              alerts={currentAlerts}
              setAlerts={setAlerts}
              onClose={() => setAlertsOpen(false)}
              onActionRun={handleAction}
            />
          )}

          {configOpen && (
            <ConfigModal
              onClose={() => setConfigOpen(false)}
              onRunPipeline={handleRunPipeline}
            />
          )}

          {/* Glassmorphism Toasts Container */}
          <div style={{
            position: "fixed",
            bottom: 24,
            right: 24,
            zIndex: 9999,
            display: "flex",
            flexDirection: "column",
            gap: 10,
            pointerEvents: "none"
          }}>
            {toasts.map(t => {
              const accentColor =
                t.type === "critical" ? "var(--c-drift)" :
                t.type === "warning" ? "#ff5555" :
                "var(--c-ai)";
              return (
                <div
                  key={t.id}
                  style={{
                    pointerEvents: "auto",
                    width: 320,
                    padding: "14px 18px",
                    borderRadius: 12,
                    background: "rgba(19, 25, 35, 0.85)",
                    border: `1px solid ${accentColor}44`,
                    borderLeft: `4px solid ${accentColor}`,
                    backdropFilter: "blur(12px)",
                    WebkitBackdropFilter: "blur(12px)",
                    boxShadow: "0 10px 30px rgba(0, 0, 0, 0.5)",
                    display: "flex",
                    flexDirection: "column",
                    gap: 4,
                    animation: "toast-in 0.25s cubic-bezier(0.2, 0.8, 0.2, 1)",
                    position: "relative"
                  }}
                >
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{
                      fontFamily: "var(--font-display)",
                      fontWeight: 700,
                      fontSize: 13,
                      color: "#fff",
                      display: "flex",
                      alignItems: "center",
                      gap: 6
                    }}>
                      <Icon name="alertTri" size={14} stroke={accentColor} strokeWidth={2.5} />
                      {t.title}
                    </span>
                    <button
                      onClick={() => setToasts(prev => prev.filter(x => x.id !== t.id))}
                      style={{
                        background: "transparent",
                        border: "none",
                        color: "var(--text-3)",
                        cursor: "pointer",
                        padding: 0,
                        lineHeight: 1
                      }}
                    >
                      <Icon name="x" size={12} />
                    </button>
                  </div>
                  <span style={{ fontSize: 12, color: "var(--text-2)", lineHeight: 1.4 }}>
                    {t.message}
                  </span>
                </div>
              );
            })}
          </div>

          {/* Terminal Console Overlay */}
          {isConsoleOpen && (
            <div className="terminal-overlay">
              <div className="terminal-window">
                <div className="terminal-header">
                  <div className="terminal-dot-group">
                    <span className="terminal-dot" style={{ background: "#ef4444" }} />
                    <span className="terminal-dot" style={{ background: "#eab308" }} />
                    <span className="terminal-dot" style={{ background: "#22c55e" }} />
                  </div>
                  <div style={{
                    fontSize: 13,
                    color: "rgba(16, 185, 129, 0.8)",
                    fontWeight: 600
                  }}>
                    Consola del Experimento · retail_forecasting_pipeline
                  </div>
                  <button
                    onClick={() => setIsConsoleOpen(false)}
                    style={{
                      background: "transparent",
                      border: "none",
                      color: "rgba(16, 185, 129, 0.6)",
                      cursor: "pointer",
                      padding: 4,
                      display: "flex",
                      alignItems: "center"
                    }}
                  >
                    <Icon name="x" size={16} />
                  </button>
                </div>

                <div className="terminal-body" ref={consoleBodyRef}>
                  {consoleLogs || "Consola inactiva. Presiona 'Iniciar Ejecución' para comenzar..."}
                  {consoleStatus === "running" && (
                    <div style={{
                      display: "flex",
                      alignItems: "center",
                      gap: 8,
                      marginTop: 12,
                      color: "var(--c-conf)"
                    }}>
                      <Icon name="refresh" size={14} style={{ animation: "spin 1.5s linear infinite" }} />
                      <span>Procesando pipeline y estimando cobertura conformal...</span>
                    </div>
                  )}
                </div>

                <div className="terminal-footer">
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span className="live-dot" style={{
                      background: consoleStatus === "running" ? "var(--c-conf)" : (consoleStatus === "failed" ? "var(--c-drift)" : "var(--text-mute)"),
                      boxShadow: consoleStatus === "running" ? undefined : "none"
                    }} />
                    <span style={{ fontSize: 11.5, color: "var(--text-2)", fontFamily: "var(--font-mono)" }}>
                      Estado: {consoleStatus.toUpperCase()}
                    </span>
                  </div>
                  <div style={{ display: "flex", gap: 10 }}>
                    {consoleStatus !== "running" && (
                      <button
                        className="btn-run"
                        onClick={startPipelineRun}
                        style={{
                          padding: "8px 16px",
                          fontSize: 12,
                          borderColor: "rgba(16, 185, 129, 0.5)",
                          background: "rgba(16, 185, 129, 0.1)"
                        }}
                      >
                        <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
                          <Icon name="play" size={12} />
                          {consoleStatus === "idle" ? "Iniciar Ejecución" : "Volver a Ejecutar"}
                        </span>
                      </button>
                    )}
                    <button
                      className="btn-run"
                      onClick={() => setIsConsoleOpen(false)}
                      style={{
                        padding: "8px 16px",
                        fontSize: 12,
                        borderColor: "var(--border)",
                        background: "rgba(255,255,255,0.02)"
                      }}
                    >
                      Cerrar
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
