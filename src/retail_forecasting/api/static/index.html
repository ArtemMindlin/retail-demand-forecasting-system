<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

<style>
  :root {
    /* Base — Slate/Zinc dark */
    --bg-0:        #07090d;
    --bg-1:        #0b0f15;
    --bg-2:        #0f141c;
    --surface:     #131923;
    --surface-2:   #1a2230;
    --border:      rgba(148, 163, 184, 0.10);
    --border-2:    rgba(148, 163, 184, 0.18);
    --text-1:      #e7ecf3;
    --text-2:      #aab4c5;
    --text-3:      #6b7689;
    --text-mute:   #4b5468;

    /* Semantic palette */
    --c-inv:       #3b82f6;  /* Coste de Inventario — azul cobalto */
    --c-conf:      #10b981;  /* Cobertura Conformal — verde esmeralda */
    --c-ai:        #8b5cf6;  /* Precisión IA MAE — púrpura neón */
    --c-drift:     #f59e0b;  /* Alertas Drift — naranja */

    --c-inv-soft:  rgba(59, 130, 246, 0.14);
    --c-conf-soft: rgba(16, 185, 129, 0.14);
    --c-ai-soft:   rgba(139, 92, 246, 0.14);
    --c-drift-soft:rgba(245, 158, 11, 0.16);

    --font-display: 'Outfit', system-ui, sans-serif;
    --font-body:    'Inter', system-ui, sans-serif;
    --font-mono:    'JetBrains Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-0);
    color: var(--text-1);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* Subtle dot grid backdrop on canvas */
  .canvas-bg {
    background-color: var(--bg-1);
    background-image:
      radial-gradient(rgba(148, 163, 184, 0.06) 1px, transparent 1px);
    background-size: 24px 24px;
    background-position: -8px -8px;
  }

  /* Glass surface */
  .glass {
    background:
      linear-gradient(180deg, rgba(255,255,255,0.022), rgba(255,255,255,0.005)),
      rgba(19, 25, 35, 0.72);
    border: 1px solid var(--border);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border-radius: 14px;
  }

  /* Native range slider styling */
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: transparent;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-runnable-track {
    height: 4px;
    border-radius: 999px;
    background: linear-gradient(to right, var(--track-fill, var(--c-inv)) 0%, var(--track-fill, var(--c-inv)) var(--track-percent, 50%), rgba(148, 163, 184, 0.16) var(--track-percent, 50%), rgba(148, 163, 184, 0.16) 100%);
  }
  input[type="range"]::-moz-range-track {
    height: 4px;
    border-radius: 999px;
    background: rgba(148, 163, 184, 0.16);
  }
  input[type="range"]::-moz-range-progress {
    height: 4px;
    border-radius: 999px;
    background: var(--track-fill, var(--c-inv));
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    margin-top: -6px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid var(--track-fill, var(--c-inv));
    box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.04), 0 0 12px var(--track-fill, var(--c-inv));
    transition: transform 0.12s ease;
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid var(--track-fill, var(--c-inv));
    box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.04), 0 0 12px var(--track-fill, var(--c-inv));
  }
  input[type="range"]:hover::-webkit-slider-thumb { transform: scale(1.1); }
  input[type="range"]:focus { outline: none; }

  /* Run optimization button */
  .btn-run {
    position: relative;
    width: 100%;
    border: 1px solid rgba(139, 92, 246, 0.55);
    background:
      radial-gradient(120% 200% at 0% 0%, rgba(139, 92, 246, 0.25), transparent 60%),
      linear-gradient(180deg, rgba(139, 92, 246, 0.16), rgba(59, 130, 246, 0.12));
    color: #fff;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.02em;
    padding: 14px 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    overflow: hidden;
  }
  .btn-run::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    box-shadow: 0 0 0 0 rgba(139, 92, 246, 0);
    transition: box-shadow 0.3s ease;
    pointer-events: none;
  }
  .btn-run:hover::before {
    box-shadow: 0 0 30px 4px rgba(139, 92, 246, 0.35), 0 0 60px 6px rgba(59, 130, 246, 0.18);
  }
  .btn-run:hover {
    border-color: rgba(139, 92, 246, 0.85);
    transform: translateY(-1px);
  }
  .btn-run:active { transform: translateY(0); }
  .btn-run:disabled { opacity: 0.5; cursor: progress; }

  /* Pulsing dot for "live" indicator */
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--c-conf);
    box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.6);
    animation: live-pulse 2s ease-out infinite;
  }
  @keyframes live-pulse {
    0%   { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.6); }
    70%  { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
    100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
  }

  .status-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10.5px;
    color: var(--text-3);
    text-decoration: none;
    font-family: var(--font-mono);
    letter-spacing: 0.06em;
    background: rgba(16, 185, 129, 0.04);
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid rgba(16, 185, 129, 0.12);
    transition: all 0.2s ease;
  }
  .status-link:hover {
    color: var(--text-1);
    background: rgba(16, 185, 129, 0.1);
    border-color: rgba(16, 185, 129, 0.3);
    transform: translateY(-0.5px);
  }

  /* KPI card */
  .kpi {
    position: relative;
    padding: 18px 18px 16px 22px;
    overflow: hidden;
    border-radius: 14px;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .kpi::before {
    content: "";
    position: absolute;
    left: 0; top: 12px; bottom: 12px;
    width: 3px;
    border-radius: 0 3px 3px 0;
    background: linear-gradient(180deg, var(--kpi-color, var(--c-inv)) 0%, transparent 100%);
  }
  .kpi:hover {
    transform: translateY(-2px);
    border-color: var(--border-2);
  }

  /* Academic card */
  .academic {
    padding: 20px;
    transition: all 0.2s ease;
    cursor: pointer;
  }
  .academic:hover {
    border-color: var(--border-2);
    transform: translateY(-2px);
    background:
      linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.005)),
      rgba(19, 25, 35, 0.85);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.12); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,0.22); }
  ::-webkit-scrollbar-track { background: transparent; }

  /* Tabular numbers */
  .tnum { font-variant-numeric: tabular-nums; }

  /* Loading skeleton shimmer */
  .shimmer {
    background: linear-gradient(90deg, rgba(148,163,184,0.06) 0%, rgba(148,163,184,0.14) 50%, rgba(148,163,184,0.06) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.4s ease-in-out infinite;
    border-radius: 6px;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Recharts overrides */
  .recharts-cartesian-axis-tick-value {
    font-family: var(--font-mono);
    font-size: 11px;
    fill: var(--text-3) !important;
  }
  .recharts-default-tooltip {
    background: rgba(11, 15, 21, 0.96) !important;
    border: 1px solid var(--border-2) !important;
    border-radius: 10px !important;
    backdrop-filter: blur(8px);
    font-family: var(--font-body) !important;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5) !important;
  }
  .recharts-tooltip-label {
    color: var(--text-2) !important;
    font-family: var(--font-mono) !important;
    font-size: 11px !important;
    margin-bottom: 6px !important;
  }
  .recharts-tooltip-item {
    color: var(--text-1) !important;
    font-size: 12px !important;
  }
  .recharts-cartesian-grid-horizontal line,
  .recharts-cartesian-grid-vertical line {
    stroke: rgba(148, 163, 184, 0.06) !important;
  }

  /* Title and section labels */
  .label-mono {
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-3);
  }
  .h-display { font-family: var(--font-display); font-weight: 700; letter-spacing: -0.01em; }

  /* Tooltip on segment chips */
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 9px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-2);
    letter-spacing: 0.04em;
  }

  /* Layout container */
  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    min-height: 100vh;
  }
  @media (max-width: 1100px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { position: static !important; height: auto !important; border-right: 0 !important; border-bottom: 1px solid var(--border); }
  }

  .sidebar {
    position: sticky;
    top: 0;
    height: 100vh;
    background: linear-gradient(180deg, #080b10 0%, #0a0e14 100%);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .canvas {
    position: relative;
    padding: 28px 32px 56px;
    max-width: 100%;
    box-sizing: border-box;
  }
  @media (max-width: 720px) {
    .canvas { padding: 20px 16px 40px; }
  }

  /* Grid utilities */
  .grid-kpi {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
  }
  @media (max-width: 1280px) { .grid-kpi { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
  @media (max-width: 560px)  { .grid-kpi { grid-template-columns: 1fr; } }

  .grid-academic {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px;
  }
  @media (max-width: 1100px) { .grid-academic { grid-template-columns: 1fr; } }

  /* Subtle terminal cursor */
  .blink-cursor::after {
    content: "▍";
    color: var(--c-conf);
    margin-left: 2px;
    animation: blink 1s steps(2) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Soft glow halo on chart container */
  .chart-card {
    position: relative;
  }
  .chart-card::after {
    content: "";
    position: absolute;
    inset: -1px;
    border-radius: inherit;
    pointer-events: none;
    background:
      radial-gradient(60% 40% at 20% 0%, rgba(59, 130, 246, 0.08), transparent 70%),
      radial-gradient(40% 30% at 100% 100%, rgba(139, 92, 246, 0.06), transparent 70%);
    z-index: 0;
  }
  .chart-card > * { position: relative; z-index: 1; }
  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(4, 6, 10, 0.72);
    backdrop-filter: blur(10px) saturate(120%);
    -webkit-backdrop-filter: blur(10px) saturate(120%);
    z-index: 100;
    display: grid;
    place-items: center;
    padding: 24px;
    animation: backdrop-in 0.18s ease-out;
  }
  @keyframes backdrop-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .modal-window {
    position: relative;
    width: min(820px, 100%);
    max-height: 88vh;
    overflow: hidden;
    border-radius: 16px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0.005)),
      rgba(13, 18, 26, 0.96);
    border: 1px solid var(--border-2);
    box-shadow:
      0 30px 80px rgba(0,0,0,0.55),
      0 0 0 1px rgba(255,255,255,0.02) inset;
    display: flex;
    flex-direction: column;
    animation: modal-in 0.24s cubic-bezier(0.2, 0.7, 0.2, 1);
  }
  @keyframes modal-in {
    from { opacity: 0; transform: translateY(8px) scale(0.985); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal-glow {
    position: absolute; inset: -1px;
    pointer-events: none;
    border-radius: inherit;
    background: radial-gradient(60% 40% at 50% 0%, var(--modal-glow, rgba(139,92,246,0.18)), transparent 70%);
    z-index: 0;
  }
  .modal-close {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--text-2);
    cursor: pointer;
    display: grid; place-items: center;
    transition: all 0.15s ease;
  }
  .modal-close:hover { background: rgba(255,255,255,0.08); color: var(--text-1); }

  .modal-body {
    padding: 22px 26px 26px;
    overflow-y: auto;
  }
  .modal-section-title {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-3);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin: 22px 0 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .modal-section-title::before {
    content: "";
    width: 14px; height: 1px;
    background: var(--modal-accent, var(--text-3));
  }
  .formula-big {
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 14px 16px;
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--border);
    border-left: 3px solid var(--modal-accent, var(--c-ai));
    border-radius: 8px;
    color: var(--text-1);
    overflow-x: auto;
    white-space: pre;
    line-height: 1.7;
  }
  .modal-text { font-size: 13px; color: var(--text-2); line-height: 1.65; }
  .modal-text code {
    font-family: var(--font-mono);
    font-size: 11.5px;
    padding: 1px 5px;
    background: rgba(148, 163, 184, 0.10);
    border-radius: 4px;
    color: var(--text-1);
  }
  .modal-text b { color: var(--text-1); font-weight: 600; }
  .modal-text i { color: var(--text-1); font-style: normal; border-bottom: 1px dashed var(--text-3); }

  .code-block {
    font-family: var(--font-mono);
    font-size: 11.5px;
    padding: 14px 16px;
    background: #060810;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-1);
    overflow-x: auto;
    line-height: 1.65;
    white-space: pre;
  }
  .code-block .k { color: #c084fc; }   /* keyword */
  .code-block .s { color: #34d399; }   /* string */
  .code-block .n { color: #60a5fa; }   /* number */
  .code-block .c { color: var(--text-mute); font-style: italic; } /* comment */
  .code-block .f { color: #fbbf24; }   /* function */

  .pill-row {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-top: 4px;
  }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 11px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-2);
  }
  .pill .v { color: var(--text-1); font-weight: 600; }
  .pill .accent { color: var(--modal-accent, var(--c-ai)); }

  /* ===== Alerts drawer ===== */
  .drawer-backdrop {
    position: fixed; inset: 0;
    background: rgba(4, 6, 10, 0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 100;
    animation: backdrop-in 0.18s ease-out;
  }
  .drawer {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: min(440px, 100%);
    background:
      linear-gradient(180deg, rgba(255,255,255,0.022), rgba(255,255,255,0.005)),
      rgba(11, 15, 21, 0.985);
    border-left: 1px solid var(--border-2);
    box-shadow: -30px 0 80px rgba(0,0,0,0.55);
    z-index: 101;
    display: flex;
    flex-direction: column;
    animation: drawer-in 0.26s cubic-bezier(0.2, 0.7, 0.2, 1);
  }
  @keyframes drawer-in {
    from { transform: translateX(20px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }
  .drawer-header {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .drawer-body {
    flex: 1;
    overflow-y: auto;
    padding: 6px 16px 16px;
  }
  .drawer-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: rgba(0,0,0,0.18);
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-3);
  }

  .alert-item {
    position: relative;
    padding: 14px 14px 14px 18px;
    border: 1px solid var(--border);
    border-radius: 10px;
    margin: 10px 0;
    background: rgba(19, 25, 35, 0.55);
    transition: all 0.15s ease;
  }
  .alert-item.unread {
    background: rgba(19, 25, 35, 0.85);
  }
  .alert-item:hover { border-color: var(--border-2); }
  .alert-item::before {
    content: "";
    position: absolute;
    left: -1px; top: 10px; bottom: 10px;
    width: 3px;
    border-radius: 0 3px 3px 0;
    background: var(--alert-color, var(--c-drift));
  }
  .alert-item.read {
    opacity: 0.55;
  }
  .alert-item.read::before { background: var(--text-mute); }

  .alert-row-1 {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 4px;
    flex-wrap: wrap;
  }
  .alert-sev {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 7px;
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
    background: var(--alert-soft, rgba(245, 158, 11, 0.16));
    color: var(--alert-color, var(--c-drift));
    border: 1px solid var(--alert-color, var(--c-drift));
    border-color: color-mix(in oklab, var(--alert-color, var(--c-drift)) 35%, transparent);
  }
  .alert-time {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-mute);
  }
  .alert-title {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 14px;
    color: var(--text-1);
    margin-bottom: 4px;
  }
  .alert-desc {
    font-size: 12px;

    font-weight: 700;
    font-size: 9.5px;

  <!-- =================== UTILITIES & MOCK API =================== -->
  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    // ----- helpers
    const fmtCurrency = (n) => "$" + n.toLocaleString("en-US", { maximumFractionDigits: 0 });
    const fmtPct = (n, d = 1) => `${n >= 0 ? "+" : ""}${n.toFixed(d)}%`;
    const fmtUnits = (n) => n.toLocaleString("en-US", { maximumFractionDigits: 0 });

    function Latex({ formula, block = false, style }) {
      const containerRef = useRef(null);
      useEffect(() => {
        if (containerRef.current) {
          try {
            katex.render(formula, containerRef.current, {
              displayMode: block,
              throwOnError: false
            });
          } catch (err) {
            console.error("KaTeX render error:", err);
            containerRef.current.textContent = formula;
          }
        }
      }, [formula, block]);
      return <span ref={containerRef} style={style} />;
    }
    window.Latex = Latex;

    // Deterministic pseudo-random (so the chart is stable between renders)
    const seededNoise = (i, seed = 17) => {
      const x = Math.sin(i * 12.9898 + seed * 78.233) * 43758.5453;
      return x - Math.floor(x);
    };

    // ----- Mock fetch (simulating FastAPI endpoints) -----
    // The real frontend will swap these for `await fetch("/api/...")`.
    const mockFetch = (endpoint, payload, latencyMs = 650) =>
      new Promise((resolve) => {
        setTimeout(() => resolve(buildResponse(endpoint, payload)), latencyMs);
      });

    function buildResponse(endpoint, p = {}) {
      // p contains: serviceLevel (0–100), shortageCost, holdingCost, capacity
      const sl = p.serviceLevel ?? 95;
      const cs = p.shortageCost ?? 18;
      const ch = p.holdingCost ?? 4;
      const cap = p.capacity ?? 12000;

      // ----- /api/forecast — 30-day series
      const days = 30;
      const series = [];
      for (let i = 0; i < days; i++) {
        const weekly = Math.sin((i / 7) * Math.PI * 2) * 38;
        const trend = i * 1.4;
        const base = 320 + trend + weekly;
        const noise = (seededNoise(i, 11) - 0.5) * 50;
        const actual = i < 22 ? Math.max(0, base + noise) : null; // last 8 days = future
        const predicted = base + (seededNoise(i, 23) - 0.5) * 10;

        // conformal interval width grows mildly with horizon
        const horizonFactor = i < 22 ? 0.06 : 0.10 + (i - 22) * 0.012;
        const widenForSL = 0.6 + ((sl - 80) / 20) * 0.9; // higher SL -> wider band
        const half = predicted * horizonFactor * widenForSL;

        series.push({
          day: i + 1,
          label: `D${String(i + 1).padStart(2, "0")}`,
          actual: actual !== null ? Math.round(actual) : null,
          predicted: Math.round(predicted),
          lower: Math.round(predicted - half),
          upper: Math.round(predicted + half),
        });
      }

      // ----- /api/kpis — depend on simulator inputs
      // Newsvendor critical ratio
      const cr = cs / (cs + ch);
      const targetCR = sl / 100;
      const ratioDelta = (targetCR - cr) * 100; // pts off

      // Inventory cost — scales w/ holding cost & service level (more SL => more safety stock => more cost)
      const invCost = Math.round((84000 + (sl - 90) * 4200 + (ch - 4) * 3800) * 1);
      const invDelta = -((cs - 18) * 0.4 + (cap - 12000) * 0.0009 + (95 - sl) * 0.5);

      // Conformal coverage: closely tracks target SL, with small empirical drift
      const empCoverage = Math.max(80, Math.min(99.4, sl - 0.6 + (seededNoise(sl, 5) - 0.5) * 0.8));
      const covDelta = empCoverage - sl;

      // MAE — improves slightly w/ tighter coverage requirements via re-fit
      const mae = +(11.2 - (sl - 90) * 0.06 + (ch - 4) * 0.04).toFixed(2);
      const maeDelta = -8.4 + (sl - 95) * 0.4;

      // Drift PSI
      const psi = +(0.18 + (seededNoise(sl + ch, 9) - 0.5) * 0.06).toFixed(3);
      const psiDelta = (psi - 0.20) * 100;

      // Recommended order quantity (newsvendor): inverse CDF approximation
      // For demonstration: avg predicted * (1 + z*sigma), z ~ from sl
      const z = sl >= 99 ? 2.33 : sl >= 97 ? 1.88 : sl >= 95 ? 1.65 : sl >= 90 ? 1.28 : 0.84;
      const avgPred = series.slice(22).reduce((s, r) => s + r.predicted, 0) / 8;
      const sigma = avgPred * 0.18;
      const qStar = Math.round(avgPred + z * sigma);

      // Capacity utilization
      const util = Math.min(100, Math.round((qStar * 4 / cap) * 100));

      return {
        forecast: series,
        kpis: {
          inventoryCost: { value: invCost, delta: invDelta },
          coverage:      { value: empCoverage, target: sl, delta: covDelta },
          mae:           { value: mae, delta: maeDelta },
          driftPSI:      { value: psi, delta: psiDelta },
        },
        recommendation: {
          qStar,
          z,
          criticalRatio: cr,
          targetCR,
          ratioDelta,
          utilization: util,
        },
      };
    }


    // --- Real API fetches with mock fallback ---
    const realFetch = async (endpoint, payload = {}) => {
      try {
        if (endpoint === "/api/forecast") {
          const res = await fetch("/api/forecast", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          if (!res.ok) throw new Error("API error " + res.status);
          return await res.json();
        } else if (endpoint === "/api/skus") {
          const query = new URLSearchParams({
            service_level: String(payload.serviceLevel ?? 95),

          });

          return await res.json();
        } else if (endpoint === "/api/drift") {

            service_level: String(payload.serviceLevel ?? 95)
          });
          const res = await fetch(`/api/drift?${query.toString()}`);

          return await res.json();
        }
      } catch (err) {
        console.warn(`Fallback to mock for ${endpoint}:`, err);
        return mockFetch(endpoint, payload);
      }
      return mockFetch(endpoint, payload);
    };

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    // ---------- math helpers ----------
    // Catmull–Rom → cubic Bézier smoothing for a series of [x,y] points
    function smoothPath(points) {
      if (!points || points.length === 0) return "";
      if (points.length === 1) return `M ${points[0][0]} ${points[0][1]}`;
      const t = 0.2;
      let d = `M ${points[0][0]} ${points[0][1]}`;
      for (let i = 0; i < points.length - 1; i++) {
        const p0 = points[i - 1] || points[i];
        const p1 = points[i];
        const p2 = points[i + 1];
        const p3 = points[i + 2] || p2;
        const c1x = p1[0] + (p2[0] - p0[0]) * t;
        const c1y = p1[1] + (p2[1] - p0[1]) * t;
        const c2x = p2[0] - (p3[0] - p1[0]) * t;
        const c2y = p2[1] - (p3[1] - p1[1]) * t;
        d += ` C ${c1x} ${c1y}, ${c2x} ${c2y}, ${p2[0]} ${p2[1]}`;
      }
      return d;
    }

    function niceTicks(min, max, count = 5) {
      const range = max - min;
      const step0 = range / count;
      const mag = Math.pow(10, Math.floor(Math.log10(step0)));
      const norm = step0 / mag;
      const step = (norm >= 5 ? 10 : norm >= 2 ? 5 : norm >= 1 ? 2 : 1) * mag;
      const lo = Math.floor(min / step) * step;
      const hi = Math.ceil(max / step) * step;
      const ticks = [];
      for (let v = lo; v <= hi + 1e-9; v += step) ticks.push(v);
      return ticks;
    }

    // ---------- chart ----------
    function ChartBlock({ data, loading, params, recommendation }) {
      const series = data?.forecast || [];
      const forecastStart = series.findIndex((d) => d.actual === null);

      const wrapRef = useRef(null);
      const [W, setW] = useState(800);
      const H = 320;
      const pad = { top: 18, right: 18, bottom: 30, left: 48 };

      useEffect(() => {
        if (!wrapRef.current) return;
        const ro = new ResizeObserver((entries) => {
          for (const e of entries) setW(Math.max(320, Math.floor(e.contentRect.width)));
        });
        ro.observe(wrapRef.current);
        return () => ro.disconnect();
      }, []);

      const [hover, setHover] = useState(null); // index into series

      const geom = useMemo(() => {
        if (series.length === 0) return null;
        const innerW = W - pad.left - pad.right;
        const innerH = H - pad.top - pad.bottom;
        const xs = series.map((_, i) => pad.left + (i / (series.length - 1)) * innerW);

        // y domain from lower/upper bands + actual
        let lo = Infinity, hi = -Infinity;
        series.forEach((d) => {
          lo = Math.min(lo, d.lower, d.actual ?? Infinity, d.predicted);
          hi = Math.max(hi, d.upper, d.actual ?? -Infinity, d.predicted);
        });
        // pad domain
        const span = hi - lo || 1;
        lo -= span * 0.08;
        hi += span * 0.08;
        const ticks = niceTicks(lo, hi, 5);
        lo = Math.min(lo, ticks[0]);
        hi = Math.max(hi, ticks[ticks.length - 1]);
        const y = (v) => pad.top + (1 - (v - lo) / (hi - lo)) * innerH;

        const actualPts = series
          .map((d, i) => (d.actual === null ? null : [xs[i], y(d.actual)]))
          .filter(Boolean);
        const predPts = series.map((d, i) => [xs[i], y(d.predicted)]);
        const upperPts = series.map((d, i) => [xs[i], y(d.upper)]);
        const lowerPts = series.map((d, i) => [xs[i], y(d.lower)]);

        // band polygon: upper forward + lower reverse
        const bandPath =
          "M " + upperPts.map(([x, y]) => `${x} ${y}`).join(" L ") +
          " L " + [...lowerPts].reverse().map(([x, y]) => `${x} ${y}`).join(" L ") + " Z";

        return {
          innerW, innerH, xs, y, lo, hi, ticks,
          actualPath: smoothPath(actualPts),
          predPath: smoothPath(predPts),
          upperPath: smoothPath(upperPts),
          lowerPath: smoothPath(lowerPts),
          bandPath,
          actualPts, predPts,
        };
      }, [series, W]);

      const onMouseMove = (e) => {
        if (!geom || !series.length) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const x = e.clientX - rect.left;
        // find nearest index
        let best = 0;
        let bestDist = Infinity;
        for (let i = 0; i < geom.xs.length; i++) {
          const d = Math.abs(geom.xs[i] - x);

    window.ChartBlock = ChartBlock;

    // ----- content per fundamental -----
    const ACADEMIC_ITEMS = [
      {
        id: "conformal",
        icon: "shield",
        color: "var(--c-conf)",
        kicker: "Conformal",
        title: "Conformal Prediction",
        formula: "C(X) = [ \\hat{y} - \\hat{q}_{1-\\alpha}, \\; \\hat{y} + \\hat{q}_{1-\\alpha} ] \\quad \\text{donde} \\quad P( Y \\in C(X) ) \\ge 1 - \\alpha",
        short: (<>Calibramos residuales sobre un holdout y obtenemos un intervalo con <b>garantía marginal</b> de cobertura — base estadística del Service Level.</>),
        bigFormula: "\\begin{aligned} R_i &= | y_i - \\hat{y}_i |, \\quad i \\in \\mathcal{D}_{\\text{cal}} \\\\ \\hat{q}_{1-\\alpha} &= \\text{Quantile}\\left(\\{R_1, \\dots, R_n\\}, \\frac{\\lceil(n+1)(1-\\alpha)\\rceil}{n}\\right) \\\\ C(X) &= [ \\hat{y}(X) - \\hat{q}_{1-\\alpha}, \\; \\hat{y}(X) + \\hat{q}_{1-\\alpha} ] \\\\ P( Y_{n+1} &\\in C(X_{n+1}) ) \\ge 1 - \\alpha \\quad \\text{(Cobertura Marginal)} \\end{aligned}",
        intuition: (<>
          La idea es <b>elegante y simple</b>: si nuestros errores históricos en un conjunto de
          calibración tienen un cierto cuantil <code>q̂</code>, entonces — bajo el único supuesto de
          <i> intercambiabilidad</i> de los datos — la siguiente observación caerá dentro del intervalo
          <code>ŷ ± q̂</code> con probabilidad <b>al menos</b> <code>1 − α</code>. <b>No requiere</b> asumir
          normalidad ni propiedades del modelo: funciona con LightGBM, redes neuronales, modelos lineales o
          cualquier <i>black-box</i>.
        </>),
        derivation: (<>
          Partimos del conjunto de calibración disjunto del entrenamiento. Calculamos los <i>scores de no-conformidad</i>
          <code> R_i = |y_i − ŷ_i|</code>. El teorema clave (Vovk et al., 2005) prueba que el <i>rank</i> de un nuevo
          score es uniforme en <code>{"{1, …, n+1}"}</code>, por lo que tomar el cuantil empírico <code>q̂</code>
          garantiza la cobertura marginal. Para hacerlo <b>adaptativo</b> usamos <i>Mondrian CP</i> (cuantiles por
          segmento de SKU) y <i>weighted CP</i> para corregir el <i>covariate shift</i> estacional.
        </>),
        example: (p, r) => {
          const alpha = 1 - p.serviceLevel / 100;
          return (<>
            Con <code>SL = {p.serviceLevel.toFixed(1)}%</code> trabajamos con <code>α = {alpha.toFixed(3)}</code>.
            Sobre <code>n = 14</code> muestras de calibración, el cuantil empírico requerido es el de orden
            <code> ⌈15 · {(1 - alpha).toFixed(3)}⌉ / 14 = {(Math.ceil(15 * (1 - alpha)) / 14).toFixed(3)}</code>.
            En la última ventana ese <code>q̂</code> se sitúa en torno a <b>{Math.round(r.qStar * 0.18)} u</b>,
            generando los intervalos translúcidos que ves en el gráfico principal.
          </>);
        },
        code:
`<span class="k">from</span> sklearn.model_selection <span class="k">import</span> train_test_split
<span class="k">import</span> numpy <span class="k">as</span> np

<span class="k">def</span> <span class="f">conformal_interval</span>(model, X_cal, y_cal, X_new, alpha=<span class="n">0.05</span>):
    <span class="c"># 1. residuales de calibración</span>
    y_hat_cal = model.predict(X_cal)
    scores    = np.abs(y_cal - y_hat_cal)

    <span class="c"># 2. cuantil ajustado por tamaño finito</span>
    n    = <span class="f">len</span>(scores)
    q    = np.quantile(scores, np.ceil((n+<span class="n">1</span>)*(<span class="n">1</span>-alpha))/n,
                       method=<span class="s">"higher"</span>)

    <span class="c"># 3. intervalo para la nueva predicción</span>
    y_hat = model.predict(X_new)
    <span class="k">return</span> y_hat - q, y_hat, y_hat + q`,
        pills: (p, r) => ([
          { label: "α", value: (1 - p.serviceLevel / 100).toFixed(3), accent: true },
          { label: "1 − α", value: `${p.serviceLevel.toFixed(1)}%` },
          { label: "n_cal", value: "14" },
          { label: "score", value: "|y − ŷ|" },
        ]),
        defense: [
          "Es distribution-free: la garantía vale sin asumir normalidad ni linealidad — clave si el tribunal pregunta por los supuestos del modelo.",
          "La garantía es marginal, no condicional: hablamos de cobertura promedio en X, no en cada subgrupo. Por eso aplicamos Mondrian CP por categoría de SKU.",
          "Bajo covariate shift (rebajas, festivos) la intercambiabilidad falla. Mitigamos con weighted CP y re-calibración semanal automática.",
          "Trade-off natural: bajar α (más cobertura) → intervalos más anchos → política Newsvendor más conservadora → más coste de almacenamiento.",
        ],
        refs: [

      {

        kicker: "Newsvendor",
        title: "Newsvendor Model",
        formula: "q^* = F^{-1}\\left( \\frac{c_s}{c_s + c_h} \\right)",
        short: (<>Cantidad óptima bajo coste asimétrico. El <b>critical ratio</b> determina el cuantil de demanda a cubrir.</>),
        bigFormula: "\\begin{aligned} \\text{Coste Esperado: } C(q) &= c_h \\cdot \\mathbb{E}[(q - D)^+] + c_s \\cdot \\mathbb{E}[(D - q)^+] \\\\ \\text{Bajo Leibniz: } \\frac{dC}{dq} &= c_h \\cdot F(q) - c_s \\cdot (1 - F(q)) = 0 \\\\ \\Rightarrow F(q^*) &= \\frac{c_s}{c_s + c_h} = \\text{CR}^* \\\\ \\Rightarrow q^* &= F^{-1}(\\text{CR}^*) \\end{aligned}",
        intuition: (<>
          Cada unidad de más nos cuesta <code>c_h</code> (almacenamiento, capital inmovilizado, obsolescencia).
          Cada unidad de menos nos cuesta <code>c_s</code> (venta perdida, penalizaciones, daño reputacional).
          Si <code>c_s ≫ c_h</code> compensa pedir mucho — <b>preferimos sobre-stockear a quedarnos cortos</b>.
          El <i>critical ratio</i> traduce esa asimetría en el <b>cuantil exacto</b> de demanda que debemos cubrir.
        </>),
        derivation: (<>
          Modelamos la demanda como variable aleatoria <code>D</code> con distribución <code>F</code>.
          El coste esperado es convexo en <code>q</code>, así que la condición de primer orden basta:
          la derivada <code>c_h · F(q) − c_s · (1 − F(q))</code> se anula en el cuantil <code>CR*</code> de la CDF.
          En este TFG la CDF <b>no es paramétrica</b>: la construimos a partir del intervalo conformal — los
          extremos <code>[L, U]</code> definen el soporte y el <i>spread</i> implícito de la incertidumbre.
        </>),
        example: (p, r) => {
          const cr = p.shortageCost / (p.shortageCost + p.holdingCost);
          return (<>
            Con <code>c_s = ${p.shortageCost}</code> y <code>c_h = ${p.holdingCost.toFixed(1)}</code>, el critical ratio es
            <code> CR* = {cr.toFixed(3)}</code> → debemos cubrir el cuantil <code>{(cr * 100).toFixed(1)}%</code> de la demanda.
            Aplicando z ≈ <code>{r.z.toFixed(2)}</code> sobre la predicción media: <code>q* = μ + z · σ ≈ </code>
            <b>{fmt.fmtUnits(r.qStar)} u</b>. <i>Mueve los sliders y observa cómo q* se reajusta en directo.</i>
          </>);

        code:
`<span class="k">from</span> scipy.stats <span class="k">import</span> norm
<span class="k">import</span> numpy <span class="k">as</span> np

<span class="k">def</span> <span class="f">newsvendor_q</span>(mu, sigma, c_s, c_h, dist=<span class="s">"normal"</span>):
    <span class="c"># critical ratio</span>
    cr = c_s / (c_s + c_h)

    <span class="k">if</span> dist == <span class="s">"normal"</span>:
        z = norm.ppf(cr)
        <span class="k">return</span> mu + z * sigma

    <span class="c"># empirical CDF a partir del intervalo conformal</span>
    samples = np.random.normal(mu, sigma, <span class="n">10_000</span>)
    <span class="k">return</span> np.quantile(samples, cr)


<span class="c"># En el endpoint /api/optimize:</span>
q_star = <span class="f">newsvendor_q</span>(mu=avg_pred, sigma=conformal_sigma,
                      c_s=req.shortage_cost, c_h=req.holding_cost)`,

          "Cuando c_s/c_h se desconocen, los inferimos del margen unitario y el coste financiero. Documentamos la sensibilidad en el slider del dashboard.",
          "Limitación honesta: asume demanda no estacional. Por eso re-estimamos μ y σ por ventana móvil de 14 días.",
        ],
        refs: [
          "Arrow, Harris, Marschak (1951) — Optimal Inventory Policy.",
          "Porteus (2002) — Foundations of Stochastic Inventory Theory.",
          "Bertsimas & Thiele (2006) — A Data-Driven Approach to Newsvendor Problems.",
        ],
      },
      {
        id: "capacity",
        icon: "layers",
        color: "var(--c-ai)",
        kicker: "LP",
        title: "Capacity Optimization",
        formula: "\\max \\sum_{i=1}^N \\pi_i q_i \\quad \\text{s.t.} \\quad \\sum_{i=1}^N v_i q_i \\le V, \\; q_i \\ge q^*_i, \\; q_i \\in \\mathbb{R}^+",
        short: (<>Cuando la capacidad <code>V</code> es vinculante, repartimos espacio entre SKUs maximizando margen esperado.</>),
        bigFormula: "\\begin{aligned} \\max_{q_1, \\dots, q_N} \\quad &\\sum_{i=1}^N \\pi_i \\cdot q_i \\quad \\text{(Margen Esperado Total)} \\\\ \\text{sujeto a:} \\quad &\\sum_{i=1}^N v_i \\cdot q_i \\le V \\quad \\text{(Capacidad Física de Almacén)} \\\\ &q_i \\ge q^{*,\\text{news}}_i \\quad \\text{(Mínimo Newsvendor por SKU)} \\\\ &q_i \\le U_i^{\\text{conformal}} \\quad \\text{(Cota Conformal por SKU)} \\\\ &q_i \\ge 0 \\quad \\forall i \\end{aligned}",
        intuition: (<>
          El Newsvendor te dice cuánto pedir <i>por SKU aislado</i>. Pero el almacén es <b>finito</b>: si la
          suma de los <code>q*_i</code> excede la capacidad, alguien tiene que ceder. La LP elige qué SKU
          sacrifica unidades minimizando la pérdida de margen total. Es una <b>capa de decisión</b> sobre las
          recomendaciones probabilísticas del modelo.
        </>),
        derivation: (<>
          Es un problema de Programación Lineal estándar — convexo, con dualidad fuerte. El dual nos da los
          <i> precios sombra</i> <code>λ</code> del recurso "capacidad": cuántos dólares de margen perdemos por
          cada unidad de espacio que <i>no</i> tenemos. <b>Es la métrica clave para decidir cuándo ampliar el
          almacén</b>. Resoluble con <code>scipy.optimize.linprog</code> (método HiGHS) en milisegundos para
          miles de SKUs.
        </>),

            Capacidad actual <code>V = {(p.capacity / 1000).toFixed(1)}k u</code>. La política agregada utiliza

            {r.utilization >= 100
              ? <> <b>Restricción activa</b>: el solver está recortando q_i en SKUs de bajo margen. El precio sombra es estrictamente positivo — ampliar capacidad mejoraría el margen.</>
              : <> Restricción <b>no vinculante</b>: cada SKU recibe su q* del Newsvendor sin recortes. Holgura {(100 - r.utilization)}%.</>
            }
          </>);
        },
        code:
`<span class="k">from</span> scipy.optimize <span class="k">import</span> linprog
<span class="k">import</span> numpy <span class="k">as</span> np

<span class="k">def</span> <span class="f">allocate_capacity</span>(margins, volumes, q_min, q_max, capacity):
    <span class="c"># linprog minimiza ⇒ negamos el margen para maximizar</span>
    c = -np.array(margins)

    <span class="c"># A_ub @ q ≤ b_ub : restricción de capacidad</span>
    A_ub = [volumes]
    b_ub = [capacity]

    <span class="c"># bounds por SKU: [q*_i_news,  U_i_conformal]</span>
    bounds = <span class="f">list</span>(<span class="f">zip</span>(q_min, q_max))

    res = <span class="f">linprog</span>(c, A_ub=A_ub, b_ub=b_ub,
                  bounds=bounds, method=<span class="s">"highs"</span>)

    <span class="k">return</span> {
        <span class="s">"q"</span>:           res.x,
        <span class="s">"margin"</span>:      -res.fun,
        <span class="s">"shadow_price"</span>: res.ineqlin.marginals[<span class="n">0</span>],
    }`,
        pills: (p, r) => ([

          "Extensible a programación entera mixta (MILP) si se incluyen costes fijos por SKU o restricciones de lote mínimo.",
        ],
        refs: [

          "Bertsimas & Tsitsiklis (1997) — Introduction to Linear Optimization.",

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    // ============ Tiny sparkline ============
    function Sparkline({ data, color = "var(--c-inv)", w = 90, h = 24, strokeWidth = 1.4, fill = true }) {
      if (!data || data.length < 2) return <svg width={w} height={h} />;
      const lo = Math.min(...data);
      const hi = Math.max(...data);
      const range = hi - lo || 1;
      const xs = data.map((_, i) => (i / (data.length - 1)) * (w - 2) + 1);
      const ys = data.map((d) => h - 2 - ((d - lo) / range) * (h - 4));
      const pts = xs.map((x, i) => [x, ys[i]]);
      const path = "M " + pts.map(([x, y]) => `${x} ${y}`).join(" L ");
      const area = path + ` L ${xs[xs.length - 1]} ${h} L ${xs[0]} ${h} Z`;
      const gradId = `spark-grad-${Math.random().toString(36).slice(2, 9)}`;
      return (
        <svg width={w} height={h} style={{ display: "block" }}>
          <defs>
            <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity={0.32} />
              <stop offset="100%" stopColor={color} stopOpacity={0} />
            </linearGradient>
          </defs>
          {fill && <path d={area} fill={`url(#${gradId})`} />}
          <path d={path} fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinejoin="round" strokeLinecap="round" />
          <circle cx={xs[xs.length - 1]} cy={ys[ys.length - 1]} r={1.8} fill={color} />
        </svg>
      );
    }
    window.Sparkline = Sparkline;

    // ============ SKU view ============
    function buildSkus(params) {
      const categories = ["Bebidas", "Lácteos", "Snacks", "Limpieza", "Frescos", "Congelados", "Higiene"];
      const skus = [];
      for (let i = 0; i < 28; i++) {
        const id = `SKU-${(1000 + i * 17).toString()}`;
        const cat = categories[i % categories.length];
        const baseDemand = 80 + (i * 19) % 320;
        const series = [];
        for (let d = 0; d < 14; d++) {
          const n = seededNoise(i * 13 + d, 7) - 0.5;
          series.push(Math.round(baseDemand + Math.sin(d / 2 + i) * baseDemand * 0.12 + n * baseDemand * 0.18));
        }
        const margin = +(0.18 + ((i * 7) % 40) / 100).toFixed(2);
        const stock = Math.round(baseDemand * (2 + ((i * 3) % 5)) * (1 - (params.serviceLevel - 95) / 200));
        const coverageTarget = params.serviceLevel;
        const empCoverage = Math.max(75, Math.min(99.8, coverageTarget - 1.4 + (seededNoise(i, 5) - 0.5) * 10));
        const driftPsi = +(0.05 + ((i * 0.027) % 0.4)).toFixed(3);
        const lastActual = series[series.length - 1];
        const lastPred = Math.round(lastActual * (1 + (seededNoise(i + 99, 3) - 0.5) * 0.18));
        const status =
          driftPsi > 0.2 ? "drift" :
          empCoverage < coverageTarget - 3 ? "shortage" :
          empCoverage > coverageTarget + 2 ? "overstock" :
          "ok";
        const q_star = Math.round(lastPred * 1.25);
        skus.push({ id, cat, series, margin, stock, q_star, empCoverage, coverageTarget, driftPsi, lastActual, lastPred, status });
      }
      return skus;
    }

    const STATUS_COLORS = {
      ok: { color: "var(--c-conf)",  label: "OK" },
      drift: { color: "var(--c-drift)", label: "DRIFT" },
      shortage: { color: "var(--c-drift)", label: "SHORTAGE" },
      overstock: { color: "var(--c-inv)", label: "OVERSTOCK" },
    };

    function SkuView({ params, loading, onSelectSku, selectedSkuId }) {
      const [search, setSearch] = useState("");
      const [filter, setFilter] = useState("all");
      const [sortKey, setSortKey] = useState("driftPsi");
      const [sortDir, setSortDir] = useState("desc");
      const [skus, setSkus] = useState([]);

      useEffect(() => {
        let active = true;
        const load = async () => {
          const data = await api.fetch("/api/skus", params);
          if (active && data) setSkus(data);
        };
        load();
        return () => { active = false; };
      }, [params]);
      const filtered = useMemo(() => {
        let r = skus;
        if (filter !== "all") r = r.filter(s => s.status === filter);
        if (search) {
          const q = search.toLowerCase();
          r = r.filter(s => s.id.toLowerCase().includes(q) || s.cat.toLowerCase().includes(q));
        }
        r = [...r].sort((a, b) => {
          const va = a[sortKey], vb = b[sortKey];
          if (typeof va === "string") return sortDir === "asc" ? va.localeCompare(vb) : vb.localeCompare(va);
          return sortDir === "asc" ? va - vb : vb - va;
        });
        return r;
      }, [skus, filter, search, sortKey, sortDir]);

      const setSort = (k) => {
        if (sortKey === k) setSortDir(d => d === "asc" ? "desc" : "asc");
        else { setSortKey(k); setSortDir("desc"); }
      };

      const counts = useMemo(() => ({
        all: skus.length,
        ok: skus.filter(s => s.status === "ok").length,
        drift: skus.filter(s => s.status === "drift").length,
        shortage: skus.filter(s => s.status === "shortage").length,
        overstock: skus.filter(s => s.status === "overstock").length,
      }), [skus]);

      const selected = filtered.find(s => s.id === selectedSkuId);

      const handleDownloadCSV = () => {
        if (!skus.length) return;
        const headers = [
          "SKU", "Categoria", "Ultimo_Actual", "Ultimo_Predicho",
          "Cobertura_Empirica", "Objetivo_Cobertura", "Drift_PSI",
          "Margen", "Cantidad_Recomendada_qStar", "Estado"

          s.id, s.cat, s.lastActual, s.lastPred,
          s.empCoverage.toFixed(2), s.coverageTarget,
          s.driftPsi.toFixed(3), (s.margin * 100).toFixed(0) + "%",
          s.q_star, s.status
        ]);
        const csvContent = "data:text/csv;charset=utf-8,"
          + [headers.join(","), ...rows.map(e => e.join(","))].join("\n");
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `plan_reposicion_retail_${new Date().toISOString().split('T')[0]}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      return (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12, marginBottom: 18 }}>
            <div>
              <div className="label-mono">VIEW · SKU-LEVEL</div>
              <div className="h-display" style={{ fontSize: 22, color: "var(--text-1)", marginTop: 4 }}>
                Inventario por SKU
              </div>
              <div style={{ fontSize: 13, color: "var(--text-3)", marginTop: 2 }}>
                {skus.length} SKUs activos · cobertura empírica calculada por <i>holdout</i> conformal
              </div>
            </div>
            <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
              <button
                onClick={handleDownloadCSV}
                style={{
                  display: "inline-flex",
                  alignItems: "center",
                  gap: 6,
                  padding: "8px 14px",
                  borderRadius: 10,
                  border: "1px solid rgba(16, 185, 129, 0.4)",
                  background: "linear-gradient(180deg, rgba(16, 185, 129, 0.1), rgba(16, 185, 129, 0.05))",
                  color: "var(--c-conf)",
                  fontFamily: "var(--font-display)",
                  fontWeight: 600,
                  fontSize: 12.5,
                  cursor: "pointer",
                  transition: "all 0.2s ease"
                }}
              >
                <Icon name="arrowDown" size={14} stroke="var(--c-conf)" strokeWidth={2} />
                Descargar CSV
              </button>
              <div style={{
                display: "inline-flex",
                padding: 4, borderRadius: 10,
                background: "rgba(255,255,255,0.025)", border: "1px solid var(--border)",
                alignItems: "center"
              }}>
                <input
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                  placeholder="Buscar SKU o categoría…"
                  style={{
                    background: "transparent", border: "none", outline: "none",
                    color: "var(--text-1)", fontFamily: "var(--font-mono)",
                    fontSize: 12, padding: "6px 10px", width: 220
                  }}
                />
              </div>
            </div>
          </div>

          {/* Filter tabs */}
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
            {[
              { id: "all", label: "Todos", n: counts.all, color: "var(--text-2)" },
              { id: "ok", label: "OK", n: counts.ok, color: "var(--c-conf)" },
              { id: "drift", label: "Drift", n: counts.drift, color: "var(--c-drift)" },
              { id: "shortage", label: "Rotura", n: counts.shortage, color: "var(--c-drift)" },
              { id: "overstock", label: "Overstock", n: counts.overstock, color: "var(--c-inv)" },
            ].map(t => (
              <button
                key={t.id}
                className={`filter-tab ${filter === t.id ? "active" : ""}`}

                {t.label} <span style={{ opacity: 0.6, marginLeft: 4 }}>{t.n}</span>
              </button>
            ))}
          </div>

          {/* Table */}
          <div className="glass" style={{ padding: 0, overflow: "hidden" }}>
            <div className="sku-grid header">
              {[
                ["id", "SKU"],
                ["cat", "Categoría"],
                ["series", "14d trend", true],
                ["lastActual", "Real"],
                ["lastPred", "Predicho"],
                ["empCoverage", "Cobertura"],
                ["driftPsi", "PSI"],
                ["margin", "Margen"],
                ["q_star", "q*"],
                ["status", "Estado"],
              ].map(([k, label, noSort]) => (
                <div

                  onClick={noSort ? undefined : () => setSort(k)}
                  style={{ cursor: noSort ? "default" : "pointer" }}
                >
                  {label}
                  {sortKey === k && !noSort && (
                    <span style={{ marginLeft: 4, color: "var(--text-2)" }}>
                      {sortDir === "asc" ? "↑" : "↓"}
                    </span>
                  )}
                </div>
              ))}
            </div>
            <div style={{ maxHeight: 480, overflowY: "auto" }}>
              {filtered.map((s) => {
                const sc = STATUS_COLORS[s.status];
                const cov = s.empCoverage;
                const covColor =
                  cov < s.coverageTarget - 3 ? "var(--c-drift)" :
                  cov > s.coverageTarget + 2 ? "var(--c-inv)" :
                  "var(--c-conf)";
                return (
                  <div
                    key={s.id}
                    className={`sku-grid row ${selectedSkuId === s.id ? "selected" : ""}`}
                    onClick={() => { if (onSelectSku) onSelectSku(s.id); }}
                  >
                    <div className="sku-cell" style={{ fontFamily: "var(--font-mono)", color: "var(--text-1)", fontSize: 12, fontWeight: 600 }}>{s.id}</div>
                    <div className="sku-cell" style={{ color: "var(--text-2)", fontSize: 12 }}>{s.cat}</div>
                    <div className="sku-cell"><Sparkline data={s.series} color={sc.color} /></div>

                    <div className="sku-cell tnum" style={{ fontFamily: "var(--font-mono)", color: "var(--c-ai)" }}>{s.lastPred}</div>
                    <div className="sku-cell">
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <div className="cov-bar" title={`${cov.toFixed(1)}% / target ${s.coverageTarget}%`}>

                            width: `${Math.min(100, (cov / 100) * 100)}%`,
                            background: covColor

                          <div className="cov-bar-target" style={{ left: `${s.coverageTarget}%` }} />

                        <span className="tnum" style={{ fontFamily: "var(--font-mono)", color: covColor, fontSize: 11 }}>

    // ============ Drift Monitor ============
    function buildDrift(params) {
      const features = [
        { name: "temperature_7d",    base: 0.27, type: "numeric",  importance: 0.32 },
        { name: "weekend_flag",      base: 0.05, type: "binary",   importance: 0.21 },
        { name: "promo_intensity",   base: 0.22, type: "numeric",  importance: 0.19 },
        { name: "price_lag_1",       base: 0.14, type: "numeric",  importance: 0.11 },
        { name: "category_id",       base: 0.07, type: "categoric",importance: 0.09 },
        { name: "competitor_idx",    base: 0.18, type: "numeric",  importance: 0.05 },
        { name: "is_holiday",        base: 0.03, type: "binary",   importance: 0.03 },
      ];
      return features.map((f, i) => {
        const noise = (seededNoise(i + params.serviceLevel, 5) - 0.5) * 0.05;
        const psi = +Math.max(0.005, f.base + noise).toFixed(3);
        const bins = 8;
        // Pre / post distributions: post is shifted/skewed
        const pre = [], post = [];
        for (let b = 0; b < bins; b++) {
          const x = (b - bins / 2) / 1.2;
          const preP = Math.exp(-x * x / 2);
          const shift = Math.min(1.6, psi * 5);
          const postP = Math.exp(-((x - shift) ** 2) / 2);
          pre.push(preP);
          post.push(postP);
        }
        const sumPre = pre.reduce((a, b) => a + b, 0);
        const sumPost = post.reduce((a, b) => a + b, 0);
        return {
          ...f,
          psi,
          status: psi > 0.20 ? "critical" : psi > 0.10 ? "warning" : "ok",
          pre: pre.map(v => v / sumPre),
          post: post.map(v => v / sumPost),
        };
      });
    }

    function DistChart({ pre, post, color }) {
      const W = 200, H = 56, bins = pre.length;
      const max = Math.max(...pre, ...post);
      const bw = W / bins;
      return (
        <svg width={W} height={H} style={{ display: "block" }}>
          {pre.map((p, i) => {
            const h = (p / max) * (H - 4);
            return (
              <rect key={`p${i}`}
                x={i * bw + 1}
                y={H - h}
                width={bw - 2}
                height={h}
                fill="rgba(148, 163, 184, 0.25)"
                rx={1.5}
              />
            );
          })}
          {post.map((p, i) => {
            const h = (p / max) * (H - 4);
            return (
              <rect key={`q${i}`}
                x={i * bw + 1}
                y={H - h}
                width={bw - 2}
                height={h}
                fill={color}
                fillOpacity={0.6}
                rx={1.5}
              />
            );
          })}
        </svg>
      );
    }

            }}>

            </div>
          </div>
        </div>
      );
    }

      // Build a 24-step metric timeline pointing toward this alert

          if (alert.sev === "critical") v = 0.05 + trend * 0.28 + noise;
          else if (alert.sev === "warning") v = 0.10 + trend * 0.12 + noise;
          else if (alert.sev === "success") v = 0.30 - trend * 0.20 + noise;
          else v = 0.12 + Math.sin(i / 4) * 0.04 + noise;
          arr.push(Math.max(0, v));
        }
        return arr;
      }, [alert.id, alert.sev]);

      const events = [
        { t: "−24h", title: "Métrica dentro de umbrales", kind: "info" },

                <div className="pill"><span style={{ color: "var(--text-3)" }}>detectada</span><span className="v">{alert.time}</span></div>
              </div>

              <div className="modal-section-title">Descripción</div>

                <Sparkline data={timeline} color={s.color} w={520} h={70} strokeWidth={1.8} />
                <div style={{

    // ============ Dynamic alerts hook ============
    function useDynamicAlerts(params, recommendation, baseAlerts) {
      const [alerts, setAlerts] = useState(baseAlerts);
      const lastConditions = useRef({});

      useEffect(() => {
        const conditions = [
          {
            id: "dyn-sl-low",
            test: params.serviceLevel < 88,
            build: () => ({
              id: "dyn-sl-low",
              sev: "critical",
              title: `Service Level objetivo bajo (${params.serviceLevel.toFixed(1)}%)`,
              desc: "El SL configurado en el simulador está por debajo del mínimo recomendado para esta vertical. Riesgo significativo de rotura en SKUs estacionales.",
              meta: [
                { k: "SL actual", v: `${params.serviceLevel.toFixed(1)}%` },
                { k: "mínimo", v: "88%" },
                { k: "α", v: (1 - params.serviceLevel / 100).toFixed(3) },
              ],
              endpoint: "POST /api/optimize",
              actionLabel: "Subir SL al 95%",
              time: "ahora",
              ts: 0,
              bundle: "RT-029-A",
              isNew: true,
            }),
          },
          {
            id: "dyn-capacity-bind",
            test: (recommendation?.utilization ?? 0) >= 95,
            build: () => ({
              id: "dyn-capacity-bind",
              sev: "warning",
              title: `Capacidad casi saturada (${recommendation.utilization}%)`,
              desc: "La política propuesta consume casi toda la capacidad. La restricción está activa o a punto de activarse — considera ampliar el almacén.",
              meta: [
                { k: "utilización", v: `${recommendation.utilization}%` },
                { k: "capacidad", v: `${(params.capacity / 1000).toFixed(1)}k u` },
                { k: "λ sombra", v: recommendation.utilization >= 100 ? "$0.62/u" : "≈ 0" },
              ],
              endpoint: "GET /api/capacity/forecast",
              actionLabel: "Simular ampliación",
              time: "ahora",
              ts: 0,
              bundle: "global",
              isNew: true,
            }),
          },
          {
            id: "dyn-ratio-extreme",
            test: params.shortageCost / params.holdingCost > 14,
            build: () => ({
              id: "dyn-ratio-extreme",
              sev: "info",
              title: "Critical ratio muy asimétrico",
              desc: `c_s / c_h = ${(params.shortageCost / params.holdingCost).toFixed(1)} — la política recomendará q* notablemente por encima de la media. Verifica que c_s y c_h reflejan el coste económico real.`,
              meta: [
                { k: "c_s", v: `$${params.shortageCost}` },
                { k: "c_h", v: `$${params.holdingCost.toFixed(1)}` },
                { k: "ratio", v: (params.shortageCost / params.holdingCost).toFixed(1) },
              ],
              endpoint: "",
              actionLabel: "Entendido",
              time: "ahora",
              ts: 0,
              bundle: "global",
              isNew: true,
            }),
          },
        ];

        setAlerts(prev => {
          let next = [...prev];
          conditions.forEach((c) => {
            const wasActive = lastConditions.current[c.id];
            const isActive = c.test;
            lastConditions.current[c.id] = isActive;
            const existsIdx = next.findIndex(a => a.id === c.id);
            if (isActive && existsIdx === -1) {
              // Insert new at top
              next = [c.build(), ...next];
            } else if (!isActive && existsIdx !== -1) {
              // Auto-resolve: remove the dynamic alert
              next = next.filter(a => a.id !== c.id);
            } else if (isActive && existsIdx !== -1) {
              // Update existing content (so meta/title reflect current sliders)
              next = next.map(a => a.id === c.id ? { ...c.build(), read: a.read } : a);
            }
          });
          return next;
        });
      }, [params.serviceLevel, params.shortageCost, params.holdingCost, params.capacity, recommendation?.utilization]);

      return [alerts, setAlerts];
    }
    window.useDynamicAlerts = useDynamicAlerts;
  </script>
  <script type="text/babel" data-presets="env,react">

      success:  { color: "var(--c-conf)",   soft: "rgba(16, 185, 129, 0.14)", label: "RESOLVED", icon: "check" },

    const SEED_ALERTS = [
      {
        id: "a-001",

    // ── helpers ──────────────────────────────────────────────────────────────
    function useApi(url, deps) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      useEffect(() => {
        if (!url) { setData(null); return; }
        let cancelled = false;
        setLoading(true);
        setError(null);
        fetch(url)
          .then(r => r.ok ? r.json() : Promise.reject(r.statusText))
          .then(d => { if (!cancelled) { setData(d); setLoading(false); } })
          .catch(e => { if (!cancelled) { setError(String(e)); setLoading(false); } });
        return () => { cancelled = true; };
      }, deps || [url]);
      return { data, loading, error };
    }

    // ── small SVG chart primitives (reuse smoothPath / niceTicks from above) ──

    function ExpForecastChart({ chartData, whatifOrders }) {
      const wrapRef = useRef(null);
      const [W, setW] = useState(800);
      const H = 320;
      const pad = { top: 18, right: 18, bottom: 34, left: 52 };

      useEffect(() => {
        if (!wrapRef.current) return;
        const ro = new ResizeObserver(es => {
          for (const e of es) setW(Math.max(320, Math.floor(e.contentRect.width)));
        });
        ro.observe(wrapRef.current);
        return () => ro.disconnect();
      }, []);

      const [hover, setHover] = useState(null);

      const geom = useMemo(() => {
        if (!chartData || !chartData.dates || chartData.dates.length === 0) return null;
        const n = chartData.dates.length;
        const innerW = W - pad.left - pad.right;
        const innerH = H - pad.top - pad.bottom;
        const xs = chartData.dates.map((_, i) => pad.left + (i / Math.max(n - 1, 1)) * innerW);

        const allVals = [
          ...(chartData.y_true || []),
          ...(chartData.y_pred || []),
          ...(chartData.q_high || []),
          ...(chartData.order_quantity || []),
          ...(whatifOrders || []),
        ].filter(v => v != null);
        if (allVals.length === 0) return null;

        let lo = Math.min(...allVals);
        let hi = Math.max(...allVals);
        const span = hi - lo || 1;
        lo -= span * 0.08; hi += span * 0.08;
        const ticks = niceTicks(lo, hi, 5);
        lo = Math.min(lo, ticks[0]);
        hi = Math.max(hi, ticks[ticks.length - 1]);
        const y = v => pad.top + (1 - (v - lo) / (hi - lo)) * innerH;

        const truePts = chartData.y_true
          .map((v, i) => v != null ? [xs[i], y(v)] : null).filter(Boolean);
        const predPts = chartData.y_pred
          .map((v, i) => v != null ? [xs[i], y(v)] : null).filter(Boolean);

        let bandPath = "";
        if (chartData.q_high && chartData.q_low) {
          const upper = chartData.q_high.map((v, i) => [xs[i], y(v ?? chartData.y_pred[i] ?? 0)]);
          const lower = chartData.q_low.map((v, i) => [xs[i], y(v ?? chartData.y_pred[i] ?? 0)]);
          bandPath = "M " + upper.map(([x, yv]) => `${x} ${yv}`).join(" L ")
            + " L " + [...lower].reverse().map(([x, yv]) => `${x} ${yv}`).join(" L ") + " Z";
        }

        // Date tick labels every ~7 or so
        const step = Math.max(1, Math.floor(n / 8));
        const xTickIdx = chartData.dates.map((_, i) => i).filter(i => i % step === 0 || i === n - 1);
        const xLabels = xTickIdx.map(i => {
          const d = chartData.dates[i];
          return d ? d.slice(5) : "";  // MM-DD
        });

        return { innerW, innerH, xs, y, lo, hi, ticks, truePath: smoothPath(truePts), predPath: smoothPath(predPts),
                 bandPath, xTickIdx, xLabels, n,
                 orderQtyPts: (chartData.order_quantity || []).map((v, i) => v != null ? [xs[i], y(v)] : null).filter(Boolean),
                 whatifPts: (whatifOrders || []).map((v, i) => v != null ? [xs[i], y(v)] : null).filter(Boolean) };
      }, [chartData, whatifOrders, W]);

      const onMouseMove = e => {
        if (!geom) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        let best = 0, bestD = Infinity;
        for (let i = 0; i < geom.xs.length; i++) {
          const d = Math.abs(geom.xs[i] - mx);
          if (d < bestD) { bestD = d; best = i; }
        }
        setHover(best);
      };

      if (!geom) return (
        <div style={{ height: H, display: "grid", placeItems: "center", color: "var(--text-3)", fontFamily: "var(--font-mono)", fontSize: 12 }}>
          Sin datos para mostrar
        </div>
      );

      const hoverDate = hover != null ? (chartData.dates[hover] || "") : "";
      const hoverTrue = hover != null ? chartData.y_true[hover] : null;
      const hoverPred = hover != null ? chartData.y_pred[hover] : null;

      return (
        <div ref={wrapRef} style={{ position: "relative", height: H }}>
          <svg width={W} height={H}
            onMouseMove={onMouseMove} onMouseLeave={() => setHover(null)}
            style={{ display: "block", overflow: "visible" }}>
            <defs>
              <linearGradient id="expBand" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#94a3b8" stopOpacity={0.22} />
                <stop offset="100%" stopColor="#3b82f6" stopOpacity={0.05} />
              </linearGradient>
            </defs>

            {/* Y grid + labels */}
            {geom.ticks.map((t, i) => (
              <g key={i}>
                <line x1={pad.left} x2={W - pad.right} y1={geom.y(t)} y2={geom.y(t)}
                  stroke="rgba(148,163,184,0.06)" strokeWidth={1} />
                <text x={pad.left - 6} y={geom.y(t) + 3.5} textAnchor="end"
                  fill="var(--text-3)" fontFamily="var(--font-mono)" fontSize={10.5}>
                  {Math.round(t)}
                </text>
              </g>
            ))}

            {/* X labels */}
            {geom.xTickIdx.map((i, ki) => (
              <text key={ki} x={geom.xs[i]} y={H - pad.bottom + 16}
