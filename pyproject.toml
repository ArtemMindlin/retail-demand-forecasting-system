[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "retail-demand-forecasting-system"
version = "0.1.0"
description = "Research-oriented retail demand forecasting pipeline for inventory decisions under uncertainty."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fsspec>=2024.6.1",
  "huggingface-hub>=0.30.0",
  "matplotlib>=3.9.0",
  "numpy>=1.26.0",
  "pandas>=2.2.0",
  "pyarrow>=16.1.0",
  "PyYAML>=6.0.2",
  "scikit-learn>=1.5.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3.0",
]
ml = [
  "lightgbm>=4.5.0",
  "xgboost>=2.1.0",
]

[project.scripts]
retail-forecast = "retail_forecasting.run:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]
